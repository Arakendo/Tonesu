name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs-material pyyaml

      - name: Run pipeline (steps 1–4)
        run: python scripts/build.py --skip 5

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

      - name: Add README to gh-pages branch
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          cat > README.md << 'EOF'
          # Tonesu — GitHub Pages deployment

          This branch contains the generated static site deployed to **[tonesu.org](https://tonesu.org/)**.

          The source lives on the [`main`](https://github.com/Arakendo/Tonesu/tree/main) branch.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: add README to gh-pages branch"
          git push origin gh-pages
