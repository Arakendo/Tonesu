site_name: Tonesu
site_description: A constructed language built on generative roots.
site_url: https://tonesu.org/
repo_url: https://github.com/Arakendo/Tonesu
repo_name: Arakendo/Tonesu

docs_dir: www/docs
site_dir: site

theme:
  name: material
  custom_dir: www/docs/overrides

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

  icon:
    logo: material/translate
    repo: material/github

nav:
  - Home: index.md
  - Tonesu:
    - tonesu/index.md
    - Sounds: tonesu/sounds.md
    - Grammar: tonesu/grammar.md
    - Building words: tonesu/words.md
    - Notation: tonesu/notation.md
    - Primitives: tonesu/primitives.md
    - Registry: tonesu/registry.md
  - Totonesu:
    - totonesu/index.md
    - Corpus:
      - totonesu/corpus/index.md
      - Sentences: totonesu/corpus/sentences.md
    - Worked examples: totonesu/examples.md
    - Sandbox: totonesu/sandbox.md
  - To'tonesu:
    - to-tonesu/index.md
    - Patterns: to-tonesu/patterns.md
    - Principles: to-tonesu/principles.md
    - Design notes: to-tonesu/design.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - def_list
  - md_in_html

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'

extra_css:
  - overrides/css/extra.css

extra:
  generator: false
