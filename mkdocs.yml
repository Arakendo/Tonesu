site_name: Tonesu
site_description: A constructed language built on generative roots.
site_url: https://tonesu.org/
repo_url: https://github.com/Arakendo/Tonesu
repo_name: Arakendo/Tonesu

docs_dir: www/docs
site_dir: site

theme:
  name: material
  custom_dir: www/docs/overrides

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

  icon:
    logo: material/translate
    repo: material/github

nav:
  - Home:
    - index.md
    - Quick start: quick-start.md
    - Cheat sheet: cheatsheet.md
  - Tonesu:
    - tonesu/index.md
    - Sounds: tonesu/sounds.md
    - Grammar: tonesu/grammar.md
    - Building words: tonesu/words.md
    - Notation: tonesu/notation.md
    - Primitives: tonesu/primitives.md
    - Registry:
      - tonesu/registry/index.md
      - English index: tonesu/registry/english.md
      - By domain: tonesu/registry/by-domain.md
      - By root: tonesu/registry/by-root.md
    - Word Builder: tonesu/builder.md
    - Corpus:
      - tonesu/corpus/index.md
      - Foundations: tonesu/corpus/foundations/index.md
      - Grammar & syntax: tonesu/corpus/grammar/index.md
      - Domains: tonesu/corpus/domains/index.md
      - Theology & philosophy: tonesu/corpus/theology/index.md
      - Translation: tonesu/corpus/translation/index.md
      - Conversations: tonesu/corpus/conversations/index.md
      - Translation Analyses: tonesu/corpus/translations/index.md
  - Totonesu:
    - totonesu/index.md
    - Worked examples: totonesu/examples.md
    - Sandbox: totonesu/sandbox.md
  - To'tonesu:
    - to-tonesu/index.md
    - Patterns: to-tonesu/patterns.md
    - Principles: to-tonesu/principles.md
    - Design notes: to-tonesu/design.md
    - Domains:
      - to-tonesu/domains/index.md
      - Biology: to-tonesu/domains/biology.md
      - Theology & Religion: to-tonesu/domains/theology.md
      - Law: to-tonesu/domains/law.md
      - Sociology: to-tonesu/domains/sociology.md
      - Mathematics: to-tonesu/domains/mathematics.md
      - Physics: to-tonesu/domains/physics.md
      - Ethics: to-tonesu/domains/ethics.md
      - Philosophy: to-tonesu/domains/philosophy.md
      - Politics: to-tonesu/domains/politics.md
      - Medicine: to-tonesu/domains/medicine.md
      - Mind & Psychology: to-tonesu/domains/mind.md
      - Language & Metalanguage: to-tonesu/domains/metalanguage.md
      - Casual Conversation: to-tonesu/domains/conversation.md
      - "Tonesu's Ontology": to-tonesu/domains/ontology.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - def_list
  - md_in_html

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'

extra_css:
  - overrides/css/extra.css

extra_javascript:
  - https://cdn.datatables.net/2.2.2/js/dataTables.umd.min.js
  - js/datatables-init.js
  - js/root-builder.js

extra:
  generator: false
