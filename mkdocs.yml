site_name: Tonesu
site_description: A constructed language built on generative roots.
site_url: https://tonesu.org/
repo_url: https://github.com/Arakendo/Tonesu
repo_name: Arakendo/Tonesu

docs_dir: www/docs
site_dir: site

theme:
  name: material
  custom_dir: www/docs/overrides

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

  icon:
    logo: material/translate
    repo: material/github

nav:
  - Home:
    - index.md
    - Quick start: quick-start.md
    - Cheat sheet: cheatsheet.md
  - Learn:
    - learn/index.md
    - Stage 0 — First Contact: learn/stage-0.md
    - Stage 1 — Roots in context: learn/stage-1.md
    - Stage 2 — Compound construction: learn/stage-2.md
    - Stage 3 — Grammar and notation: learn/stage-3.md
    - Stage 4 — Derived vocabulary: learn/stage-4.md
    - Stage 5 — Epistemic discipline: learn/stage-5.md
    - Stage 6 — Production: learn/stage-6.md
  - Tonesu:
    - tonesu/index.md
    - The language:
      - Sounds: tonesu/sounds.md
      - Primitives: tonesu/primitives.md
      - Building words: tonesu/words.md
      - Grammar: tonesu/grammar.md
      - Scope prefixes: tonesu/scope.md
      - Notation: tonesu/notation.md
      - Morphology: tonesu/morphology.md
      - Quick reference: tonesu/patterns.md
      - Special forms: tonesu/named-roots.md
      - Domain system: tonesu/domains.md
    - Vocabulary:
      - Word registry: tonesu/registry/overview.md
      - English lookup: tonesu/registry/english.md
      - By domain: tonesu/registry/by-domain.md
      - By root: tonesu/registry/by-root.md
      - Colloquial forms: tonesu/registry/colloquial.md
      - Colloquial lookup: tonesu/registry/colloquial-english.md
      - Word Builder: tonesu/builder.md
  - Totonesu:
    - totonesu/index.md
    - Practical:
      - Worked examples: totonesu/examples.md
      - Production pathways: totonesu/pathways.md
      - Conversations: totonesu/conversations.md
      - Sandbox: totonesu/sandbox.md
    - Analysis:
      - Contrast walkthroughs: totonesu/contrasts.md
      - Register & colloquial: totonesu/register.md
      - Failures & edge cases: totonesu/failures.md
      - Stress tests: totonesu/stress-tests.md
    - Sentences:
      - Corpus: totonesu/corpus/overview.md
      - Foundations: totonesu/corpus/foundations/overview.md
      - Grammar & syntax: totonesu/corpus/grammar/overview.md
      - Domains: totonesu/corpus/domains/overview.md
      - Theology & philosophy: totonesu/corpus/theology/overview.md
      - Translation: totonesu/corpus/translation/overview.md
      - Conversation corpus: totonesu/corpus/conversations/overview.md
      - Translation Analyses: totonesu/corpus/translations/overview.md
  - To'tonesu:
    - to-tonesu/index.md
    - Pattern analysis: to-tonesu/patterns.md
    - Principles: to-tonesu/principles.md
    - Design notes: to-tonesu/design.md
    - Knowledge & claims: to-tonesu/knowledge.md
    - Domain exploration: to-tonesu/domains/index.md
    - Sciences:
      - Biology: to-tonesu/domains/biology.md
      - Mathematics: to-tonesu/domains/mathematics.md
      - Physics: to-tonesu/domains/physics.md
    - Society:
      - Law: to-tonesu/domains/law.md
      - Sociology: to-tonesu/domains/sociology.md
      - Politics: to-tonesu/domains/politics.md
      - Medicine: to-tonesu/domains/medicine.md
      - Mind & Psychology: to-tonesu/domains/mind.md
    - Values & ideas:
      - Ethics: to-tonesu/domains/ethics.md
      - Philosophy: to-tonesu/domains/philosophy.md
      - Theology & Religion: to-tonesu/domains/theology.md
    - Language & meta:
      - Language & Metalanguage: to-tonesu/domains/metalanguage.md
      - Casual Conversation: to-tonesu/domains/conversation.md
      - "Tonesu's Ontology": to-tonesu/domains/ontology.md
  - About: about.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - def_list
  - md_in_html

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'

extra_css:
  - overrides/css/extra.css

extra_javascript:
  - js/jquery.slim.min.js
  - js/dataTables.min.js
  - js/datatables-init.js
  - js/root-builder.js
  - js/web-speech.js

extra:
  generator: false
