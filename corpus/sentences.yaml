  source_file: sentences/v4-current/s398-plus.md
  source_anchor: S586
  notes: 'In treaty negotiation, the formal session record distinguishes two types
    of delegational response: (1) a **lodged objection** — "Delegation B reiterated
    its rejection of Delegation A''s position" — which is what `no — [counter-claim]`
    at Round 3 produces; and (2) a **submitted counter-position** — "Delegation B
    advanced its canonical counter-argument" — which is what `ke, [counter-claim]`
    produces. The distinction is not merely stylistic. A lodged objection is a veto
    move that pauses the process; a submitted counter-position is an argumentative
    move that advances the process. In negotiations that are designed to reach agreement
    rather than entrench opposition, the `ke` form is not just more precise — it is
    the form that signals good faith. The diplomatic function of `ke` is therefore:
    "I am not obstructing; I am advancing the counter-argument." This is the maximum-load
    version of the information-freshness rule: what would be informational waste in
    a philosophical debate becomes a bad-faith signal in a treaty context.'
