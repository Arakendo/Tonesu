  source_file: sentences/v4-current/s398-plus.md
  source_anchor: S441
  notes: '`go-no-fe` = necessary being (God; `go` + `no-fe` = origin without limiting
    boundary). `de` = decay/dissolution (primitive). `helm` = is culturally/functionally
    understood as. Nietzsche''s claim is a cultural observation, not a metaphysical
    fact: the concept of God has functionally decayed in the modern imagination. `helm`
    is precisely right — `go-no-fe helms de` would be a logical contradiction (a necessary
    being is by definition incapable of dissolution). `helm` admits the tension: in
    the cultural-functional register, the necessary being is *understood as* dissolved.
    The force of the provocation is in the gap between `helm` and `helms`. Contrast
    immediately with S442.'
