    from a higher level — standard Tarskian object/metalanguage structure. No loop.
    This is the available and productive construction: Tonesu can assess the truth
    status of external propositions without paradox, because the evaluating sentence
    is always outside the proposition being evaluated. The Liar collapses because
    `ze` is a person-pronoun, not a sentence-indexical; `lo-to-ze` always points to
    someone''s claim, never to the current sentence.'
