      \ \"yes\":** `ru` satisfies a polar question (the question was binary;\n  `ru`\
      \ picks the affirmative branch). Compare with echo-confirmation (C003 B1: full\n\
      \  proposition restatement) and action-confirmation (C001 B3: `ka-to-su-ki`).\
      \ Three\n  strategies now attested: (1) `ru` = minimal affirm; (2) echo = restatement\
