    - W059
    first_attests: []
    notes: "- **THE AMBIGUOUS CASE.** `to-si` fronted before what appears to be a\
      \ polar proposition\n  (`la-mi  ne-ra-ki` = I [am] attuning). But `ne-ra-ki`\
      \ is an inchoative process that\n  normally takes a `lo`-patient (the thing\
      \ being attuned to). The patient is absent. Two\n  valid readings:\n  - **Polar\
      \ reading:** the patient is dropped by discourse context (the field was just\n\
      \    discussed); the question is: \"Am I attuning [to the field / to it]?\"\
      \ — unknown is\n    truth-value of the complete proposition with recovered patient.\n\
      \  - **Content reading:** the patient is unknown (not omitted); the question\
      \ is: \"What am\n    I attuning to?\" — unknown is the argument, and `to-si`\
      \ fronts a proposition with an\n    unknown patient slot. But on the content\
      \ reading, `to-si` should be in argument\n    position (`la-mi  ne-ra-ki  to-si?`)\
