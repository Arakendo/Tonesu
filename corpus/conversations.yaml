  source_file: conversations/c005-c007.md
  turns:
  - turn: A1
    tonesu: to-si — lo-pa-ra  be-now
    gloss_line: knowledge-inquiry — patient:field  is-active-now
    natural: Is the field active?
    words_attested:
    - W026
    - W053
    first_attests: []
    notes: "- Third polar question in corpus (B2.C004 was a polar; C003 A1 was first\
      \ explicit\n  polar). Structure: `to-si` fronted (OUTSIDE the proposition),\
      \ dash as inquiry-frame\n  boundary, then the complete well-formed proposition\
      \ `lo-pa-ra  be-now`.\n- The proposition `lo-pa-ra  be-now` is structurally\
      \ complete: a patient exists, a state\n  predicate follows. `to-si` does not\
      \ fill any argument slot inside it; it sits outside\n  the proposition, querying\
      \ the truth value. This is the defining structural feature of\n  the polar question\
      \ type.\n- Contrast with C001 B1: `de  vo  to-si?` — there, `to-si?` fills the\
      \ *qualifier slot*\n  inside the proposition (what quality of decay?). The unknown\
      \ argument is inside; `to-si`\n  is inside. Here: unknown is outside (truth\
      \ value); `to-si` is outside.\n- The positional distinction is now explicit:\
      \ **content questions** have `to-si` filling\n  an argument slot inside the\
      \ proposition; **polar questions** have `to-si` fronted\n  outside the complete\
      \ proposition."
  - turn: B1
    tonesu: ru — lo-pa-ra  be-now  ra-vo  nu-be  lo-si-fe
    gloss_line: '[affirm] — patient:field  active-now  energy-quality  exceeds  threshold'
    natural: Yes — the field is active and above threshold.
    words_attested:
    - W053
    - W070
    - W071
    first_attests: []
    notes: "- **First corpus use of `ru` (W039: unity/coherence) as a minimal affirmative.**\
      \ `ru` =\n  coherence/unity — standing alone as the first element, it functions\
      \ as \"[that coheres]\" /\n  \"yes.\" This is semantically transparent: `ru`\
      \ is not a new function word; it is the\n  primitive whose meaning (\"it holds\
      \ together,\" \"it is coherent\") works as an affirmation\n  of the prior question's\
      \ proposition. `lo-pa-ra  be-now` = the field is active = that\n  is coherent\
      \ with what you asked = `ru`.\n- The dash separates the affirmative from the\
      \ extended answer. B does not stop at `ru`;\n  B adds the relevant qualifier\
