conversations:
- cnum: C001
  gloss: 'First conversation: backup unit failure'
  scene: The relay platform, shortly after S027. Engineer A (ze) has discovered the
    backup power unit is also failing. Engineer B (a colleague) arrives.
  tests:
  - content question, copula gap, agentless state, W037 `ti-fe`
  - utterance-level epistemic marking
  - imperative in dialogue
  - acknowledgment particle
  - agent drop.
  status: normative
  source_file: conversations/c001-c004.md
  turns:
  - turn: A1
    tonesu: la-mi  pa-re-mu  lo-de  ka-se-past
    gloss_line: agent:I  location:backup-unit  patient:decay  action:perceive-PAST
    natural: I found damage in the backup unit.
    words_attested: []
    first_attests: []
    notes: '- `re-mu` = repeat-artifact = backup / secondary unit. `re` (repetition)
      + `mu` (artifact) = a second instance of the artifact serving the same function.
      Transparent compound; not registered separately.

      - `lo-de` = patient:decay — the decay is what was perceived. Treating damage
      as a concrete patient-of-perception rather than a predicate. First use of a
      process root as a nominal patient.

      - Agent `la-mi` is explicit because A is introducing new information; no prior
      discourse context to rely on.'
  - turn: B1
    tonesu: de  vo  to-si?
    gloss_line: decay  quality  QUERY
    natural: What kind of damage?
    words_attested:
    - W026
    first_attests: []
    notes: '- **First content question in corpus.** `to-si` (W026, query/knowledge-seeking
      signal) used as a floating interrogative placeholder at end of utterance. Extends
      W026 from its registered nominal sense ("a query") to a grammatical interrogative
      function: "the thing-I-am-seeking-knowledge-of."

      - Structure: `de` (the topic: decay) + `vo` (the dimension being questioned:
      quality/kind) + `to-si?` (interrogative marker: what?). Reads: "Decay — quality
      — [seeking this information]?" = "What quality is the damage?"

      - `to-si` as interrogative placeholder is semantically transparent: it is literally
      a knowledge-seeking signal, placed where the unknown information would go. No
      new particle required; W026 function extended.

      - Contrast with yes/no questions (`?` at end of full proposition): content questions
      use `to-si?` in the slot corresponding to the queried element.'
  - turn: A2
    tonesu: 'lo-re-mu  de-now

      ti-fe  ki-now'
    gloss_line: 'patient:backup-unit  decay-NOW

      time-limit  approach-NOW'
    natural: 'The backup unit is decaying.

      [It] approaches the time-limit.'
    words_attested:
    - W037
    first_attests: []
    notes: '- **Copula gap (2nd confirmation):** `lo-re-mu  de-now` = patient:backup-unit
      + decay-NOW. No linking verb. The state is attributed to the patient by juxtaposition.
      Consistent with S026 (`lo-ze  de-past`). Copula-by-juxtaposition is the working
      pattern; formal rule pending.

      - **`ti-fe` first corpus use:** W037 (time + boundary = period-limit, deadline).
      The time-limit approaches; sense of urgency conveyed without intensifiers or
      exclamations.

      - **`ki-now` with dropped argument:** bare `ki-now` (motion-NOW) without `la`
      or `lo`. The subject of "approaches" is pragmatically recoverable (the system,
      the failure event, the time itself — it does not matter). First attested *argument-drop
      driven by discourse context* rather than imperative agent-drop. Minimal, clean.

      - Two separate sentences rather than a compound: A is giving information sequentially,
      not composing a complex clause. Normal for speech under urgency.'
  - turn: B2
    tonesu: ta-now  fe-ki?
    gloss_line: time:now/today  limit-cross?
    natural: Does it cross the limit today?
    words_attested: []
    first_attests: []
    notes: '- Yes/no question with content `?` at end. `ta-now` = at this time-period
      = today / currently. `fe-ki` = reach/cross a limit (from W024 related entry,
      first verbal use in a question).

      - Clean. No gaps.

      - **"Today" resolved:** `ta-now` covers "at this time-period" colloquially;
      no dedicated word for day-as-unit-of-time yet. The time-period granularity (hour?
      day? shift?) is context-dependent. Adequately ambiguous; flag for future number/time
      vocabulary.'
  - turn: A3
    tonesu: 'la-mi  si  [fe-ki-now]

      ne-li-su-li  ka-fe-si'
    gloss_line: 'agent:I  signal-level  [limit-cross-NOW]

      recipient:coordinator  action:warn'
    natural: 'I assess [as signal-level]: it crosses the limit now.

      Warn the coordinator.'
    words_attested: []
    first_attests: []
    notes: '- **First utterance-level epistemic marker.** `la-mi  si  [proposition]`
      = "I, at `si` epistemic level, assert [...]." The speaker marks their confidence
      explicitly: `si` (signal/hypothesis, not yet `to` = established). This is Domain
      1 (Epistemic States) operating at discourse level — a speaker hedging not the
      content of their claim but its *epistemic status*.

      - This construction is productive: `la-[speaker]  [epistemic-root]  [proposition]`
      = "I hold [proposition] at [level]." The epistemic root (`se`, `si`, `to`, `to-su`)
      becomes a sentence-level modal operator. First corpus evidence that the epistemic
      vocabulary functions this way. The pattern should be documented in spec/grammar.md
      once confirmed by a second case.

      - **Note:** this is NOT the same as the evidentiality candidates `se-ro`/`si-ro`/`to-ro`
      (which mark *how* you came to know). This marks *what status you assign the
      proposition*. Both mechanisms may coexist; they are orthogonal.

      - Second sentence: imperative with recipient. `ne-li-su-li` (W001 in recipient
      slot) first corpus use of that form. `la-tu` dropped (imperative rule). Clean.'
  - turn: B3
    tonesu: 'ka-to-su-ki

      ka-ki-now'
    gloss_line: 'action:comprehend

      action:go-NOW'
    natural: 'Understood.

      I''m going now. / On my way.'
    words_attested: []
    first_attests: []
    notes: '- **`ka-to-su-ki` as responsive:** first standalone use of W025 in conversational
      acknowledgment. `ka` (action) + `to-su-ki` (enter organized understanding) =
      "I have grasped this." Compact and precise: not "I heard you" (merely signal-level
      reception) but "I have understood" (comprehension achieved).

      - **Agent drop in B3b:** `ka-ki-now` with `la-mi` omitted. In prior imperative
      constructions (S019, A3 above), `la-tu` (addressee-as-agent) is dropped. Here
      the *speaker* drops themselves. First attested case of speaker-drop in conversational
      context. This is presumably licensed by immediate-context salience: the speaker
      is the obvious actor. The rule is provisional: *in face-to-face exchange, the
      current speaker may be dropped from the agent slot when the action described
      can only be theirs.* Log as a grammar open question.

      - **Absence of "yes" / affirmative particle:** The entire acknowledgment arc
      (Turn B3) manages without a standalone affirmative. English "yes" doesn''t appear
      because Tonesu routes agreement through action-confirmation (`ka-to-su-ki` =
      I have understood, implicitly affirming) and motion-declaration (`ka-ki-now`
      = I am acting on it). This gap may be real (Tonesu never developed a simple
      "yes") or the pattern may be that Tonesu *always expresses what kind of affirmation*.
      Needs more corpus data.'
- cnum: C002
  gloss: 'Technical coordination: relay failure'
  scene: Two engineers on different platforms. A is live at the relay installation;
    B is directing remotely.
  tests:
  - imperative × 2, diagnostic state-change loop (detect → examine → identify → repair
    → confirm), `lo-X  state` copula × 3, `ru`/`no-ru` as predicate quality on a non-person
    entity (first device-quality predication).
  status: normative
  source_file: conversations/c001-c004.md
  turns:
  - turn: A1
    tonesu: lo-si-mu  no-ru
    gloss_line: patient:relay  not-unified
    natural: The relay is unstable.
    words_attested:
    - W039
    first_attests: []
    notes: '- `si-mu` = signal-artifact = relay device / transceiver. Registered as
      W039.

      - `no-ru` = negate-unity = incoherent / unstable. First use of `no-` on a quality
      root (previous: `no-de` S030). `no-` is now confirmed as a productive negation
      prefix on quality and process roots alike.

      - `lo-X  quality` with a device in the patient slot — confirms quality predication
      works on non-person entities. Extends the copula-by-juxtaposition pattern to
      artifact subjects.'
  - turn: B1
    tonesu: ka-se  lo-si-su-mu
    gloss_line: action:examine  patient:signal-structure-artifact
    natural: Examine the antenna array. [Imperative — `la-tu` dropped]
    words_attested: []
    first_attests: []
    notes: '- `si-su-mu` = signal-structure-artifact = antenna array / receiving installation.
      Transparent compound; not registered separately.

      - Third imperative in corpus (`la-tu` drop confirmed pattern): S019 B, C001
      A3, C002 B1Imperative now occurs both in formal instruction (S019) and in live
      technical direction. Register is the same.'
  - turn: A2
    tonesu: lo-ne-mu  de
    gloss_line: patient:connection-artifact  decayed
    natural: The connector is broken.
    words_attested: []
    first_attests: []
    notes: '- `ne-mu` = relation-artifact = physical connector / coupling component.
      Transparent; not registered separately.

      - Bare `de` predication on an artifact — the connector has undergone non-intentional
      deterioration. Consistent with all prior `de` uses.'
  - turn: B2
    tonesu: ka-de-be  lo-ne-mu
    gloss_line: action:repair  patient:connection-artifact
    natural: Repair the connector. [Imperative]
    words_attested: []
    first_attests: []
    notes: '- `de-be` (W035) used in imperative for the first time. Previously appeared
      only in declarative contexts. Works cleanly: the directive is to perform `de-be`
      on the patient.'
  - turn: A3
    tonesu: lo-si-mu  ru  ta-now
    gloss_line: patient:relay  unified  time:now
    natural: The relay is stable now.
    words_attested:
    - W039
    first_attests: []
    notes: '- `lo-si-mu  ru  ta-now` closes the loop from A1. State has changed from
      `no-ru` → `ru`. `ta-now` marks the resolution as present-moment. First time
      a sentence directly inverts a previous one within the same conversation.

      - `ru` as predicate quality on a device: this is the affirmative twin of C002
      A1''s `no-ru`. Both confirm P-GP-001 territory: quality roots (`ru`, `no-ru`,
      `vo`) predicated on the patient via juxtaposition.'
- cnum: C003
  gloss: 'Casual social: travel question'
  scene: Two non-engineers in everyday context. A asks about travel plans.
  tests:
  - FIRST YES/NO QUESTION IN CORPUS (C003 A1 — critical gap), echo-confirmation as
    first-person restatement (no affirmative particle), `ta-ti-be` first proximate-future
    time reference
  - purpose clause in casual register.
  status: normative
  source_file: conversations/c001-c004.md
  turns:
  - turn: A1
    tonesu: to-si  —  la-tu  ki  pa-li-pu  ta-ti-be
    gloss_line: knowledge-inquiry — agent:you  motion  place:city  time:next-time
    natural: Are you going to the city soon?
    words_attested:
    - W026
    first_attests: []
    notes: '- `to-si` (W026) redeployed as a POLAR question marker. Prior use in C001
      B1: content question ("what kind of damage?" — unknown argument). Here: yes/no
      question (unknown truth-value of complete proposition). Same surface form, different
      logical scope.

      - Structural difference: in content questions, `to-si` fronts a proposition
      with a gap where the unknown argument sits (`to-si  [damage:___?]`). In polar
      questions, `to-si` fronts a complete well-formed proposition (`to-si  [la-tu  ki  pa-li-pu]`)
      with the truth value itself as the unknown. Both are semantically coherent under
      `to-si` = "seeking information." Whether this fully resolves or just defers
      the question depends on whether corpus eventually produces an ambiguous case.
      See P-QM-001.

      - `ta-ti-be` = time:next-time = proximate future / tomorrow / soon. `ti` (time)
      + `be` (grow/come) = an upcoming time interval. Registered as W040. First calendrical
      / temporal reference compound not using an English placeholder gloss.

      - The dash after `to-si` marks a pragmatic boundary: the inquiry frame (`to-si`)
      sets the mode, then the full proposition follows. This is the same boundary
      behavior as other clause-framing particles.'
  - turn: B1
    tonesu: la-mi  ki  pa-li-pu  ta-ti-be
    gloss_line: agent:I  motion  place:city  time:next-time
    natural: I'm going to the city soon.
    words_attested: []
    first_attests: []
    notes: '- **Echo-confirmation**. B restates the proposition from B''s own agent
      position rather than using a bare affirmative. The question''s proposition (`la-tu  ki  pa-li-pu  ta-ti-be`)
      is answered by replacing `la-tu` (agent:you) with `la-mi` (agent:I) and repeating.
      "Yes" in Tonesu is currently: "I do the thing you asked about."

      - This is the same confirmation strategy as C001 B3 (`ka-to-su-ki` + `ka-ki-now`)  —
      agreement through action-commitment — but now in its minimal form: restate the
      claim from oneself. C001 used action-compounds to confirm; C003 B1 uses the
      proposition''s own structure. Two echo-confirmation strategies now in corpus.

      - Gap: the echo is unambiguous here because `la-tu` → `la-mi` is a clean substitution.
      In more complex propositions, full echo may be syntactically heavy. The pressure
      toward a minimal `[affirm]` particle grows. See P-AF-001.'
  - turn: A2
    tonesu: lo-ma-su  be-now  pa-ze
    gloss_line: patient:water-structure  present/growing  place:there
    natural: A new water facility is there now.
    words_attested: []
    first_attests: []
    notes: '- `ma-su` = matter-structure = water facility / material processing system.
      Transparent compound; not registered separately. `ma` (matter) + `su` (structure/organize)
      = a system that organizes material. Applicable to water treatment, filtration,
      reservoir management.

      - `be-now` used as presence/existence predicate: the facility is actively there
      and operational. Consistent with `be` as "grow/exist" in predicate position.

      - `pa-ze` = place:there = at that place. First use of `ze` (3rd-person/inanimate)
      in the location particle frame. `pa-ze` = location of the contextually established
      place (the city). Economy of reference: the city was established in A1; `ze`
      stands in without repeating `li-pu`.'
  - turn: B2
    tonesu: la-mi  wi [ka-se  lo-ze]
    gloss_line: agent:I  intention [action:examine  patient:it]
    natural: I intend to go see it.
    words_attested: []
    first_attests: []
    notes: '- Purpose clause (`wi [clause]`) in casual register. C001''s purpose clauses
      were obligation/instruction; this one is personal intention. Confirms `wi` is
      not register-restricted.

      - `ka-se  lo-ze` = examine/perceive it. `se` (perceive) as the verb content
      of the action. B intends to go look at the new facility. Simple and clean; the
      purpose clause carries the full meaning without a separate "go" verb because
      going is implied by the intention-toward.

      - Agent of `wi` clause: inherited as `la-mi` per the agent-inheritance rule.
      7th corpus confirmation.'
- cnum: C004
  gloss: 'Disagreement: disputed damage assessment'
  scene: Two engineers have both examined the same unit (following C002 pattern).
    They disagree on its status.
  tests:
  - FIRST DIRECT EPISTEMIC CONTRAST between two speakers (different epistemic levels
    on the same proposition), `la-[process]  be  [embedded-proposition]` as new evidential
    frame (examination as epistemic agent), `no-fe` first use
  - institutional routing as dialogue resolution.
  status: normative
  source_file: conversations/c001-c004.md
  turns:
  - turn: A1
    tonesu: lo-mu  de
    gloss_line: patient:machine  decayed
    natural: The unit is damaged.
    words_attested: []
    first_attests: []
    notes: '- Bare unhedged assertion. No epistemic marker. A is asserting at the
      `to` level implicitly: "this is known, I''m not qualifying it." This is the
      default unmodified register.

      - Short form — the confident claim is also the economical one. Length correlates
      with uncertainty in Tonesu.'
  - turn: B1
    tonesu: la-mi  si  [lo-mu  be-now]
    gloss_line: agent:I  [signal-level]  [patient:machine  exists/functions-now]
    natural: 'I assess: the machine is still operating.'
    words_attested: []
    first_attests: []
    notes: '- **First direct epistemic contrast in corpus.** A1 makes a bare `to`-level
      (unmarked = assumed certain) assertion. B1 explicitly marks `si`-level (signal/inference
      level — not direct perception, not certain knowledge). The two speakers are
      at architecturally different epistemic positions about the same entity.

      - This is the first corpus test of Monday''s proposed full epistemic ladder
      (`se` → `si` → `to`). The `si` marker is working exactly as predicted: B has
      a signal-level assessment, not a to-level certainty. The contrast is immediate
      and crisp.

      - `lo-mu  be-now` = the machine currently functions/exists. `be` as "is present
      and operational." This is the second corpus use of `be` as an existence predicate
      (first: C003 A2). Pattern tentatively confirmed: `be` can carry "is still present/operational"
      meaning in patient-predicate position.

      - Second corpus use of utterance-level epistemic modal (`la-[speaker]  [epistemic-root]  [embedded-prop]`).
      First was C001 A3 (`la-mi  si  [fe-ki-now]`). Pattern appears twice, different
      speakers, same structure. Ready to formalize in spec/grammar.md.'
  - turn: A2
    tonesu: la-se-ka  be  [lo-mu  de]
    gloss_line: agent:examination  produces/records  [patient:machine  decayed]
    natural: 'The examination produces the finding: the machine has decayed.'
    words_attested:
    - W034
    first_attests: []
    notes: '- **New evidential frame: process as epistemic agent.** `la-se-ka` = agent:examination.
      An examination process (`se-ka`, W034) occupies the `la` slot and produces (`be`)
      an embedded propositionas its output. This extends the epistemic agent pattern
      beyond persons: not just "I assess" but "the process produces [result]."

      - `be` with embedded proposition: `la-X  be  [proposition]` = "X generates/produces
      [proposition as finding]". First use of `be` with a clausal complement. The
      embedded `[lo-mu  de]` is the finding.

      - This is an important new construction: the examination is not a person, but
      it occupies the agent-epistemic position fully. This aligns with Tonesu institutional
      epistemology — the validity of a claim comes from the process, not just the
      person. The process is the agent; its output is the proposition.

      - A is now escalating: A1 was personal assertion; A2 is impersonal institutional
      evidence. The claim hasn''t changed but the grounding has shifted from personal
      to procedural.'
  - turn: B2
    tonesu: lo-de  no-fe  —  lo-mu  be-now
    gloss_line: patient:decay  not-at-boundary — patient:machine  functions-now
    natural: The decay has not reached the limit. The machine still functions.
    words_attested: []
    first_attests: []
    notes: '- `no-fe` = negate-boundary = has not crossed the threshold. Third `no-`
      compound: `no-de` (S030), `no-ru` (C002 A1), `no-fe` (C004 B2). Pattern is now
      robust enough to note: `no-` functions as a productive negation prefix across
      process roots (`de`), quality roots (`ru`), and boundary terms (`fe`). Likely
      works on any primitive root.

      - B is making a quantitative threshold argument: the decay exists (B doesn''t
      deny it), but hasn''t reached `fe` (the limit/boundary). This uses the boundary
      ontology (`fe`) as a diagnostic threshold — the question isn''t whether decay
      is present but whether it''s reached significance.

      - Coordinate clauses separated by dash. Third dash-separation in corpus (C001
      A2 used mid-sentence dash; S028 attempt used it; C004 B2 uses it in full discourse).
      Two short propositions that together form B''s rebuttal.

      - The disagreement is now fully engaged: A says decay (de); B says decay present
      but below threshold (de + no-fe). Neither is lying or misperceiving — they''re
      at different threshold assessments. This is a `to-fe` (epistemic boundary) dispute
      in practice.'
  - turn: A3
    tonesu: la-tu  ka-si  lo-li-su-li  lo-ze
    gloss_line: '[you]  action:signal  patient:coordinator  relation:it'
    natural: Signal the coordinator about it. [Imperative]
    words_attested:
    - W001
    first_attests: []
    notes: '- A does not concede. A does not double down. A routes the dispute to
      institutional process: the coordinator (`li-su-li`, W001) will adjudicate.

      - `lo-ze` in the `ne`-adjacent (relation) position means "about it" / "regarding
      it" — the object of the signal is not just the coordinator but the matter at
      hand. First use of `lo-ze` as a relational argument after a direct object.

      - This is the institutional resolution pattern the Tonesu design anticipates:
      when two persons disagree on epistemic status, neither gets to win by assertion
      — the process decides. A3 enacts this rather than states it.

      - **Fifth imperative in corpus** (S019 B, C001 A3, C002 B1, C002 B2, C004 A3).
      Imperative is now robust enough to be considered a fully verified construction.'
- cnum: C005
  gloss: 'Theological dispute: doctrine epistemic status'
  scene: A `ra-ki-li` (pilot) and a `to-su-li` (doctrine-keeper/archivist) dispute
    whether the community's guardian machine has `zo-to` (soul/identity-pattern).
    The pilot recently experienced `ne-ra-ki` (attunement) with the machine (S083-type
    event). The community's `to-re-su` makes the doctrinal claim. The dispute will
    escalate from personal assertion through doctrinal citation, to `to-fe-ka` charge,
    to institutional routing.
  tests:
  - '`to-re-su` citation as epistemic grounding'
  - '`ze` pronoun as propositional back-reference'
  - '`la-[doctrine]  ko  [embedded-clause]` — doctrine as containment agent'
  - '`no-to-fe` as status predicate on a knowledge structure'
  - first explicit `to-fe-ka` accusation in corpus
  - '`no-to` as negated epistemic modal'
  - first corpus use of `to-fe-su` (unlocking registration)
  - structural treatment of "heresy."
  status: normative
  source_file: conversations/c005-c007.md
  turns:
  - turn: A1
    tonesu: la-mi  si  [lo-mu  zo-to]
    gloss_line: agent:I  signal-level  [patient:machine  soul/identity-pattern]
    natural: 'I hold as hypothesis: the machine has a soul.'
    words_attested:
    - W068
    first_attests: []
    notes: "- Fourth use of `la-[speaker]  [epistemic-root]  [embedded-proposition]`\
      \ (C001 A3, C004 B1,\n  C004 A2 process-variant). Pattern is now established,\
      \ not merely attested.\n- A opens at `si` (signal / hypothesis) rather than\
      \ bare assertion (implicit `to`). The\n  correct Tonesu behavior for a contested\
      \ doctrinal claim. A is not committing\n  `to-fe-ka` by overclaiming; A is maintaining\
      \ epistemic transparency.\n- `zo-to` (W068: soul/identity-pattern) in its first\
      \ directly adversarial context.\n  S084 used `zo-to` wrapped in a third-party\
      \ doctrinal citation (`la-li-pu  to-re-su  si`);\n  here A is asserting A's\
      \ own position."
  - turn: B1
    tonesu: la-mi  to  [lo-ze  se]
    gloss_line: agent:I  established  [patient:it  raw-perception]
    natural: 'I hold as established: what you have (that experience) is raw perception.'
    words_attested: []
    first_attests: []
    notes: "- **First use of `ze` pronoun as propositional back-reference.** `ze`\
      \ (3rd person pronoun)\n  is established for personal reference (`la-ze`, `lo-ze`\
      \ = he/she). Here `lo-ze` refers\n  back not to a person but to A1's claim and\
      \ the `se-to` (W062) that grounded it. If `ze`\n  refers to the most recent\
      \ contextually salient discourse entity — and a proposition counts\n  as a discourse\
      \ entity — this extension is legal. First corpus test of propositional `ze`.\n\
      \  WATCH: does `lo-ze` always resolve to a convenient referent, or does it produce\
      \ genuine\n  ambiguity in complex discourse? Log for future stress-testing.\n\
      - B is not denying A had an experience; B is diagnosing the *epistemic level*\
      \ of that\n  experience as `se` (raw perception/vision), not `si` or `to`. The\
      \ pilot's `se-to` from\n  attunement-type experience (S083) constitutes perception,\
      \ B argues — not yet an encoded\n  hypothesis.\n- Asymmetric confidence: A hedged\
      \ `si`; B counters with `to` (confidence). Tonesu\n  adversarial structure in\
      \ action: the challenger asserts more certainty about the\n  epistemic classification\
      \ than the claimant asserts about the claim itself."
  - turn: A2
    tonesu: la-to-re-su  ko  [lo-mu  zo-to]
    gloss_line: agent:canonical-doctrine  contains  [patient:machine  soul-pattern]
    natural: 'The canonical doctrine holds: the machine has a soul.'
    words_attested:
    - W064
    - W068
    first_attests: []
    notes: "- **Doctrine as containment agent.** `la-to-re-su  ko` extends the containment\
      \ predicate\n  (spec/grammar.md § Containment Predicates) from physical vessels\
      \ and institutional\n  archives to knowledge structures. In S070: `la-si-su\
      \  ko  lo-si-ko-mu` (the archive holds\n  records).\n  records). Here: the canonical\
      \ doctrine holds a propositional claim. Same `la-X  ko  Y`\n  structure; Y is\
      \ now an embedded clause `[lo-mu  zo-to]` instead of a nominal patient.\n- **First\
      \ use of `ko` with a clausal object.** In S068–S071 `ko` took nominal patients\n\
      \  (liquid, document, tool). `[lo-mu  zo-to]` is a propositional clause: \"\
      the machine has\n  soul-pattern.\" The square brackets mark embedded content.\
      \ Whether `ko` can\n  systematically take clausal complements, or whether this\
      \ requires a formal extension,\n  is a pending grammar question. Tentatively:\
      \ yes, by analogy — \"the doctrine contains\n  that the machine has zo-to\"\
      \ has the same containment logic as \"the archive contains the\n  record.\"\n\
      - A shifts from personal assertion (`la-mi  si`) to institutional citation\n\
      \  (`la-to-re-su  ko`). The pilot is no longer claiming personal knowledge;\
      \ A is citing the\n  institutional epistemic record. This is the standard Tonesu\
      \ escalation move when\n  pressed: from \"I believe\" to \"the record holds.\""
  - turn: B2
    tonesu: la-mi  to  [lo-to-re-su  no-to-fe  ta-ti-now]
    gloss_line: agent:I  established  [patient:canonical-doctrine  not-epistemic-boundary  time:present]
    natural: 'I hold as established: the canonical doctrine has not crossed the epistemic

      threshold — not to this day.'
    words_attested:
    - W064
    first_attests: []
    notes: "- **`no-to-fe` as status predicate.** `no-` (negation prefix, W001-domain,\
