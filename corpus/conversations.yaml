    notes: "- Polar question targeting the `si` (hypothesis) level. After B2 denied\
      \ `to`, A probes\n  the next level down: does B at least have a working model?\n\
      - Second corpus example of a polar question querying an embedded epistemic modal\n\
      \  (first was A1 of this same batch). The pattern `to-si — la-tu  [modal]  [sub-prop]`\n\
      \  is stable across levels.\n- Systematic drilling: `to` (A1) → `si` (A3) →\
      \ `se` (A4). Three questions, three\n  levels. The investigator works from top\
      \ down."
  - turn: B3
    tonesu: la-mi  no-si  [lo-ne-ra  vo]
    gloss_line: agent:I  not-hypothesize  [patient:the-resonance  quality]
    natural: I do not hypothesize a resonance character.
    words_attested:
    - W058
    first_attests: []
    notes: "- **First corpus use of `no-si`.** `la-mi  no-si  [prop]` = the speaker\
      \ denies having\n  a working hypothesis about [prop]. Not merely sub-established\
      \ — not even a formed\n  working model.\n- KEY DISTINCTION from `no-to`:\n \
      \ - `no-to` (B2): I don't hold it as established. Could still hypothesize or\
      \ perceive.\n  - `no-si` (B3): I don't even hypothesize it. `no-si` entails\
      \ `no-to` (if you have no\n    hypothesis, you necessarily have no established\
      \ knowledge either) but does NOT entail\n    `no-se` (you could have a perceptual\
      \ signal without forming a hypothesis from it).\n- B3 removes the hypothesis\
      \ possibility that B2 left open. After B2 + B3, the only\n  remaining question\
      \ is whether B has any raw perceptual signal at all."
  - turn: A4
    tonesu: to-si — la-tu  se  [lo-ne-ra]
    gloss_line: knowledge-inquiry — agent:you  perceive  [patient:the-resonance]
    natural: Do you perceive the resonance?
    words_attested:
    - W026
    - W058
    first_attests: []
    notes: "- Floor-level probe. `se` = raw perception / signal basis. The most basic\
      \ question:\n  does B have any signal data for the resonance at all?\n- Note:\
      \ the `vo` qualifier is absent. At the `se` floor, asking about perceptual\n\
      \  *character* would be premature — A is asking whether any signal exists, not\
      \ what\n  character it has. The qualifier is properly omitted here.\n- Third\
      \ concurrence of polar + embedded epistemic modal in this batch (A1, A3, A4)."
  - turn: B4
    tonesu: la-mi  no-se  [lo-ne-ra]
    gloss_line: agent:I  not-perceive  [patient:the-resonance]
    natural: I have no perceptual basis for the resonance.
    words_attested:
    - W058
    first_attests: []
    notes: "- **First corpus use of `no-se`.** `la-mi  no-se  [prop]` = the speaker\
      \ has no\n  perceptual / signal basis for the embedded proposition. Epistemic\
      \ floor: no raw input.\n- HIERARCHICAL ENTAILMENT: `no-se` entails `no-si` and\
      \ `no-to`. If you have no\n  perceptual basis, you necessarily have no formed\
      \ hypothesis and no established\n  knowledge. B4 retroactively subsumes B2 and\
      \ B3 — the floor denial is the maximally\n  strong claim that covers the entire\
      \ scale.\n- After B4, the complete epistemic diagram for the resonance character:\n\
      \  `se: absent / si: absent / to: absent`. Total epistemic blank.\n  Contrast\
      \ with the threshold breach from B1: `se: present / si: present / to: present`\n\
      \  (established, which entails `si` and `se` were both active). Clean partition:\
      \ B knows\n  the event at every level; B has no epistemic contact with the resonance\
      \ at any level."
  - turn: A5
    tonesu: la-mi  to  [la-tu  no-se  lo-ne-ra]
    gloss_line: agent:I  established  [agent:you  not-perceive  patient:the-resonance]
    natural: 'I hold as established: you have no perceptual basis for the resonance.'
    words_attested:
    - W058
    first_attests: []
    notes: "- **First corpus case of nested / stacked epistemic modals.** The outer\
      \ frame\n  `la-mi  to` (A certifies at established level) takes an embedded\
      \ proposition that\n  itself contains an epistemic disclaimer: `la-tu  no-se\
      \  lo-ne-ra` (B has no\n  perceptual basis for the resonance). A is converting\
      \ B's personal epistemic floor\n  into a formally certified matter of record.\n\
      - This is the institutional function of open testimony: the knowledge-keeper\
      \ transforms\n  a speaker's subjective epistemic state into a certified fact.\
      \ \"It is established that\n  you have no signal basis\" — the negative epistemic\
      \ state becomes a positive certified\n  claim about that state.\n- The `no-se`\
      \ floor is chosen for the outer certification: since `no-se` entails\n  `no-si`\
      \ and `no-to`, certifying at floor is the maximally strong institutional\n \
      \ summary without redundancy. \"I establish that your epistemic contact is zero\"\
      \ is\n  more economical than certifying each level separately.\n- Grammatically:\
      \ the embedding works because `la-tu  no-se  lo-ne-ra` is a well-formed\n  proposition\
      \ (agent + negated epistemic root + embedded patient). It occupies the\n  `[prop]`\
      \ slot of `la-mi  to  [prop]` exactly as any other proposition. No special\n\
      \  construction is needed; subordination generates nested epistemic embedding\
      \ freely."
  - turn: B5
    tonesu: ru
    gloss_line: '[affirm/cohere]'
    natural: Acknowledged.
    words_attested: []
    first_attests: []
    notes: "- **Bare `ru` with no elaboration: fourth total attestation, first completely\
      \ bare\n  use.** Prior three: C006 B1 (`ru — [detail]`), C006 B4 (`ru — [detail]`),\
      \ C007 B1\n  (`ru — [detail]`). All had elaborations following the dash. Here,\
      \ B ratifies A's\n  formal institutional summary with nothing added — no correction,\
      \ no detail, no\n  new information.\n- In formal institutional contexts, bare\
      \ `ru` is the acknowledgment token: pure\n  alignment without additional content.\
      \ The `— [elaboration]` seen in all prior uses\n  was a choice to add more,\
      \ never a syntactic requirement.\n- Confirms: `ru` is fully functional as a\
      \ standalone clause. The minimum affirmative\n  in Tonesu is one word."
- cnum: C008
  gloss: 'Arbitration hearing: `ze` under competing person and proposition referents'
  scene: 'A `to-fe-li` (epistemic arbiter, role B) is conducting a compliance hearing.
    A `ra-ki-li` (pilot, role A) is testifying that a `to-su-li` (archivist, absent
    third party, referred to as `ze`) suppressed a signal record. The arbiter questions
    A''s testimony. The exchange manufactures four distinct `lo-ze` uses: (1) person-reading,
    unambiguous agent; (2) propositional-reading, forced by predicate-type incompatibility;
    (3) genuinely ambiguous — `to-fe-ka` predicate applies coherently to both persons
    and propositions; (4) disambiguation by same-turn restatement. Resolution of P-PR-001.'
  tests:
  - '`ze` as person vs propositional back-reference'
  - predicate-type disambiguation
  - most-recent-salient rule
  - restatement as the canonical disambiguation strategy
  - '`no` contrast coordinator as disambiguation tool.'
  status: normative
  source_file: conversations/c008-plus.md
  turns:
  - turn: A1
    tonesu: la-ze  de  lo-si-de  ta-ti-de
    gloss_line: agent:ze  decayed  patient:record-of-signal  at-past-time
    natural: 'The archivist suppressed the record.

      (literally: caused the past-signal record to decay)'
    words_attested:
    - W098
    first_attests: []
    notes: "- `la-ze` = archivist (absent third party). Agent slot; unambiguous person-reading.\n\
      - `de lo-si-de` = caused the past-signal record to decay = suppressed/destroyed\
      \ the\n  document. `si-de` (W098: past-signal, signal-of-record) in the patient\
      \ slot.\n  `ta-ti-de` = at past time.\n- **State of discourse after A1:** ze-the-person\
      \ is the sole salient referent. No\n  proposition is yet a discourse entity."
    turn_subtitle: Person-reading (`la-ze` agent slot)
  - turn: B1
    tonesu: la-mi  si  [la-ze  no-de  lo-si-de]
    gloss_line: agent:I  hypothesize  [agent:ze  not-decayed  patient:record-of-signal]
    natural: 'I hypothesize: ze did not suppress the record.'
    words_attested:
    - W098
    first_attests: []
    notes: "- B challenges A1 at `si` level — not asserting the counterclaim as established,\
      \ only\n  as hypothesis. Correct Tonesu practice: challenge at the lowest confident\
      \ epistemic\n  level.\n- **State of discourse after B1:** two referents are\
      \ now simultaneously salient:\n  (1) ze-the-person (from A1, `la-ze` agent of\
      \ the alleged act); and\n  (2) B1's counterclaim proposition (`la-ze  no-de\
      \  lo-si-de`) as an explicit discourse\n  entity. This is the collision that\
      \ P-PR-001 anticipates."
    turn_subtitle: Competing proposition enters discourse
  - turn: A2
    tonesu: la-mi  to  [lo-ze  se]
    gloss_line: agent:I  established  [patient:that-claim  raw-perception]
    natural: 'I hold as established: that claim is mere raw perception.'
    words_attested: []
    first_attests: []
    notes: "- `lo-ze` = B1's proposition — not ze-the-person. A is dismissing the\
      \ counterclaim as\n  being at `se` level: B's hypothesis lacks evidential grounding.\n\
      - **Why person-reading is blocked:** `se` (raw perception / signal-level epistemic\
      \ datum)\n  predicates of data, claims, and epistemic states — not of persons.\
      \ `lo-ze  se` read as\n  \"ze (the archivist) is raw perception\" is incoherent:\
      \ persons are not epistemic data\n  levels. Therefore `ze` is forced to the\
      \ propositional referent (B1's claim).\n- **Predicate-type disambiguation confirmed.**\
      \ Same form as C005 B1 (`la-mi  to  [lo-ze\n  se]` — identical) where it was\
      \ also propositional and also unambiguous. A2 adds the\n  crucial analytical\
      \ dimension: the person-referent was actively in discourse and *still*\n  the\
      \ proposition was forced by predicate incompatibility.\n- A's escalation pattern:\
      \ A opens with a `to`-level denial of B's epistemic status,\n  not a re-assertion\
      \ of the underlying charge. Methodical: address the challenge before\n  re-asserting\
      \ the original claim."
    turn_subtitle: Propositional `ze`, forced by predicate-type
  - turn: B2
    tonesu: la-mi  to  [lo-ze  to-fe-ka]
    gloss_line: agent:I  established  [patient:ze  deliberate-fraud]
    natural: 'I hold as established: [ze / that claim] is deliberate fraud.'
    words_attested:
    - W029
    first_attests: []
    notes: "- **First genuine `ze` ambiguity in the corpus.** Two coherent readings:\n\
      \  - **Person-reading:** \"I hold as established that ze (the archivist) committed\n\
      \    deliberate epistemic boundary violation.\" B is counter-charging ze — the\
      \ same entity\n    A accused in A1.\n  - **Proposition-reading:** \"I hold as\
      \ established that A2's move — dismissing my\n    testimony as mere `se` — is\
      \ itself `to-fe-ka`.\" B is accusing A of epistemic\n    deflation: deliberately\
      \ downgrading B's evidenced hypothesis to `se` level.\n- `to-fe-ka` (W029: deliberate\
      \ epistemic boundary violation) applies coherently to both\n  persons (as agents\
      \ of the violation) and to propositions/claims (as acts or moves that\n  constitute\
      \ the violation). No predicate-type incompatibility is possible here.\n- **Neither\
      \ referent is more grammatically prominent.** B1 introduced a proposition;\n\
      \  A1 introduced the person. Both are one turn away from B2. The discourse does\
      \ not\n  structurally favour either.\n- This is the breaking point P-PR-001\
      \ was watching for."
    turn_subtitle: Genuinely ambiguous `lo-ze`
  - turn: A3
    tonesu: la-ze  to-fe-ka  no  la-mi
    gloss_line: agent:ze  deliberate-fraud  [contrast]  agent:I
    natural: Ze committed the fraud — not me.
    words_attested:
    - W029
    first_attests: []
    notes: "- **Disambiguation by NP restatement in the same sentence.** A interprets\
      \ B2 as the\n  person-reading (ze charged with fraud) and clarifies: `la-ze\
      \ ... no la-mi` uses the\n  `no` contrast coordinator to make explicit who is\
      \ the agent of `to-fe-ka`. \"Ze did it,\n  not me.\" This rules out the proposition-reading\
      \ entirely — if B had been charging A's\n  epistemic move (A2) as fraudulent,\
      \ the contrast referent would not be `la-mi`; A is\n  instead re-asserting ze-the-person\
      \ as the fraud actor.\n- **`no` contrast coordinator as disambiguation tool.**\
      \ The standard Level 4 negation\n  (`[actual constituent]  no  [rejected alternative]`,\
      \ formalized spec/grammar.md §\n  Negation) performs double duty here: it clarifies\
      \ the referent AND asserts the charge.\n  `la-ze  to-fe-ka  no  la-mi` = \"\
      [It is] ze [who committed] fraud, not me.\"\n- **Most-recently-salient rule\
      \ confirmed by failure mode.** A could not rely on recency\n  alone; `to-fe-ka`\
      \ was too compatible with both referents. Restatement was *required*\n  to resolve\
      \ the ambiguity. This is the finding: the most-recent-salient rule is\n  insufficient\
      \ when a predicate applies symmetrically to both types."
    turn_subtitle: Disambiguation by restatement
  - turn: B3
    tonesu: la-mi  se  [la-ze  de  lo-si-de]  —  la-tu  ka-si  lo-to-fe-su
    gloss_line: 'agent:I  perceive  [agent:ze  decayed  patient:record-of-signal]  —

      agent:you  action:signal  patient:epistemic-standards-framework'
    natural: 'I note (perceptually): ze suppressed a record. — Submit this to the
      standards body.'
    words_attested:
    - W072
    - W098
    first_attests: []
    notes: "- **First positive attestation of `la-mi  se  [embedded clause]`.** The\
      \ epistemic modal\n  frame `la-[speaker]  se  [proposition]` had its corpus\
      \ column in spec/grammar.md marked\n  \"positive awaited\" — the negated form\
      \ `no-se` was attested at C007 B4 but the positive\n  `la-mi  se  [prop]` had\
      \ not appeared in the record until now. C008 B3 closes that gap.\n  The positive\
      \ form means: \"I have perceptual / signal-level grounds for noting [prop].\"\
      \n  Applied to testimony: the arbiter received A's claim as a perceptual input\
      \ (they heard\n  it) and records it at exactly that level — no higher.\n- **Arbiter\
      \ uses `se` (perceptual/floor level) for the ruling-note.** B does not certify\n\
      \  A's charge at `to` or `si` level — B acknowledges A's testimony as perceptually\
      \ received\n  (`se`) and routes it to `to-fe-su` for adjudication. Correct Tonesu\
      \ arbitration\n  form: the arbiter records the testimony at the level it was\
      \ received, not at a higher\n  asserted level.\n- **Explicit NP `la-ze` replaces\
      \ `lo-ze` in B3.** The arbiter re-states A1's claim in\n  full (`la-ze  de \
      \ lo-si-de`) rather than using `ze` back-reference. This is the\n  Tonesu formal-register\
      \ practice: once ambiguity has been produced in a proceeding,\n  explicit NPs\
      \ are preferred over pronouns in the official record. The rationale is\n  institutional,\
      \ not grammatical: the record must be unambiguous to `to-fe-su`.\n- `la-tu \
      \ ka-si  lo-to-fe-su` = second corpus use of `to-fe-su` routing (first: C005\
      \ B3).\n  Same institutional routing pattern; confirms it is productive."
    turn_subtitle: 'Arbiter''s record: explicit NP, no ze back-reference'
