      \ W028) = \"has not\n  crossed the epistemic boundary / has not been certified\
      \ through the `to-fe` process.\"\n  This follows the established `no-[root]`\
      \ pattern (`no-de`, `no-ru`, `no-fe`); `no-to-fe`\n  is its application to the\
      \ epistemic certification boundary.\n- B is not challenging the *content* of\
      \ the doctrine. B is challenging the *epistemic\n  procedural status* of the\
      \ doctrine itself. The move: the `to-re-su` calls itself\n  canonical (i.e.,\
      \ claims `to-su` level) but was never adjudicated by a `to-fe-li` panel,\n \
      \ and therefore never legitimately crossed the `to-fe` threshold into warranted\
      \ `to-su`\n  status.\n- `ta-ti-now` — present-time anchor makes this an ongoing\
      \ status claim, not a historical\n  observation. The doctrine has not been certified\
      \ as of right now.\n- This is the Tonesu structural equivalent of: \"Your scripture\
      \ isn't actually\n  canonical; it was never validated by the proper epistemic\
      \ body.\" The attack is procedural,\n  not theological. The language makes no\
      \ distinction between these."
  - turn: A3
    tonesu: la-mi  to  [lo-ze  to-fe-ka]
    gloss_line: agent:I  established  [patient:that-claim  deliberate-epistemic-boundary-violation]
    natural: 'I hold as established: what you just said is deliberate epistemic fraud.'
    words_attested:
    - W029
    first_attests: []
    notes: "- **First explicit `to-fe-ka` accusation in corpus.** `to-fe-ka` (W029:\
      \ deliberate\n  epistemic boundary violation) was defined and registered but\
      \ never directly leveled as\n  a charge in a sentence until now. A3 is a full\
      \ formal accusation.\n- `lo-ze` — propositional back-reference again; this time\
      \ A is using `ze` to refer to B2's\n  claim. The pilot accuses B of *deflation\
      \ `to-fe-ka`*: B is knowingly suppressing the\n  doctrine's `to-su` status by\
      \ falsely asserting `no-to-fe`. The inflation/deflation\n  directionality: B\
      \ is deflating (claiming a `to-su`-status doctrine is below `to-fe`),\n  which\
      \ is the harder-to-prove and politically more subtle form of `to-fe-ka`.\n-\
      \ A's escalation pattern: A1 = `si`-hedge; A2 = institutional citation at `to-su`\
      \ level;\n  A3 = `to`-level accusation of fraud. Three distinct epistemic escalation\
      \ steps in three\n  turns, each raising the stakes.\n- The asymmetry of levels:\
      \ A is charging B with `to-fe-ka` at full `to`-confidence. To\n  level a fraud\
      \ charge requires exactly this: you must assert `to`-level knowledge that\n\
      \  the boundary was deliberately violated. A `si`-level fraud charge is incoherent."
  - turn: B3
    tonesu: la-mi  no-to  [lo-ze  to-fe-ka]  —  la-tu  ka-si  lo-to-fe-su
    gloss_line: 'agent:I  not-established  [patient:that  epistemic-fraud]  —  [you]  action:signal

      patient:epistemic-standards-framework'
    natural: 'I hold as not-established: that is not fraud. — Submit this to the standards
      body.'
    words_attested:
    - W029
    - W072
    first_attests: []
    notes: "- **`la-mi  no-to  [prop]` — new construction.** `la-mi  to  [prop]` =\
      \ \"I hold as\n  established.\" `no-to` by the `no-` prefix rule = \"I hold\
      \ as not-established\" or \"I do\n  not assert [prop] as established.\" This\
      \ is the negation of an epistemic stance, not a\n  negation of the proposition's\
      \ content. Productive extension of the epistemic modal\n  pattern: the modal\
      \ itself can be negated. B is not saying \"it is established that this\n  is\
      \ NOT fraud\"; B is saying \"I do not hold the fraud charge as established.\"\
      \ A weaker,\n  more defensible position — B refuses to certify A's accusation\
      \ as `to`-level.\n- **First corpus use of `to-fe-su`.** `la-tu  ka-si  lo-to-fe-su`\
      \ — the institutional\n  routing pattern from C004 A3 (`la-tu  ka-si  lo-li-su-li`)\
      \ now applied to the epistemic\n  standards framework rather than an operational\
      \ coordinator. The distinction is load-bearing:\n  an engineering dispute routes\
      \ to `li-su-li` (coordinator); a doctrinal epistemic status\n  dispute routes\
      \ to `to-fe-su` (epistemic standards body). The level of institution matches\n\
      \  the level of dispute. `to-fe-su` is now in corpus: register as W072.\n- B\
      \ does not concede the fraud charge and does not counter-escalate with a personal\n\
      \  accusation. B routes to the process. The canonical Tonesu response: when\
      \ two parties\n  are at irreconcilable `to-fe` positions, the dispute exits\
      \ the personal layer and enters\n  the institutional layer. Neither party wins\
      \ by assertion; the body adjudicates.\n- **Structural result:** \"Heresy\" has\
      \ no dedicated Tonesu word. A doctrinal challenge\n  is structurally a `to-fe`\
      \ dispute — epistemically identical to a scientific or engineering\n  knowledge\
      \ dispute. The machinery is the same: `to-fe-ka`/`to-fe-ki` charges, `to-fe-li`\n\
      \  arbiters, `to-fe-su` adjudication. Religion in Tonesu is a subset of the\
      \ knowledge\n  domain, and all knowledge disputes use the same institutional\
      \ tools."
- cnum: C006
  gloss: 'Pre-jump briefing: polar question, content question, and the ambiguous case'
  scene: Navigator A (`di-ki-li`) and Pilot B (`ra-ki-li`) in a pre-jump sequence.
