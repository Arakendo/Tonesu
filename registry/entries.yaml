    is this, [being the] cause-of-the-covenant-

    relation." The shedding of blood uses de-zo-ki''ma-mi = "the decreasing of my
    living-liquid" = my blood being poured out (S435, S437).

    zo-ki''ma is the general biologically-occurring blood; its theological significance
    as covenant-medium comes from context and from the `go-ne-to-fe` clause (the causal-genitive
    of the covenant relationship).'
  related: 'zo (primitive: living thing), ki''ma (W114: liquid), de-ki''ma (W162:
    wine/fermented liquid — transformation parallel), zo-ma (W163: body — the material
    counterpart)'
