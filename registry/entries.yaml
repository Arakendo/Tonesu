- wnum: W118
  form: vo-ne
  gloss: righteousness, right relational standing
  status: active
  lead_root: vo
  type: compound
  class: quality / relational state
  register: standard / ethical / theological
  domain: ethics / theology / social
  definition: righteousness; right relational standing; being in a state of value
    within one's bonds and social connections. The quality of acting rightly within
    all one's relationships — not merely internal virtue but correct alignment with
    one's relational obligations. Corresponds to Hebrew tsedakah and Greek dikaiosynē
    (righteousness / justice).
  composition: 'vo (value/quality) + ne (relation/bond) = value-in-relation = the
