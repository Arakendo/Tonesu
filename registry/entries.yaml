- wnum: W126
  form: si-no-vo-li
  gloss: hypocrite, person of valueless signal
  status: active
  lead_root: si
  type: compound
  class: person / role
  register: standard / ethical
  domain: ethics / social
  definition: hypocrite; a person of valueless signal; one whose outward communication
    does not match their inner state or intentions — one who signals goodness without
    possessing it. Greek hupokritēs (actor, one who plays a role).
  composition: 'si (signal/representation) + no (negation) + vo (value/quality) +
    li (person) = person-of-valueless-signal = a person whose signals lack the value
    they claim. Head-final: li (person) is head; si-no-vo = the kind of signal-person:
    one whose signals are value-depleted.'
  notes: 'si-no-vo-li is the full noun. The adjective compound is si-no-vo —

    "hypocritical" or "of false-signal character." The personification `-li` builds
    on the standard person-formation pattern.

    Matthew 6 uses the word six times total (6:2, 6:5, 6:16, 23:13+); it is a high-frequency
    term for this theological corpus.

    Related construct: `si-no-zo-to` = signal-without-matching-soul-pattern could
    express the specific sense of an actor who plays a role different from their identity.
    This is a stronger/more specific reading if needed; si-no-vo-li is the general
