- wnum: W022
  form: mu-ka
  gloss: use / operate a tool or artifact
  status: active
  lead_root: mu
  type: compound
  class: process
  register: standard
  domain: general
  definition: operate or use an artifact; use, operate, employ a tool or device
  composition: 'mu (artifact/object) + ka (action) — head-final: an action characterized
    by its relationship to an artifact; the act of putting an artifact to work'
  notes: 'Registered to resolve placeholder gloss `ka-use` in S016. Candidate form
    was identified during corpus work. Head-final rule satisfied: the artifact (mu)
    specifies the domain of the action (ka). Contrast with su-mu-li where mu describes
    the object produced; here mu describes the object acted upon.'
  related: mu-ka-li (operator, one who uses tools), mu-ka-mu (tool for operating another
    tool)
  examples: '"la-tu  ka-mu-ka  lo-mu" — you operate the machine "la-mi  ka-be-past  lo-mu  wi
    [la-tu  ka-mu-ka]" — I built the machine for you to use (S016)'
  groups:
  - Signal / Communication
  first_use: S120
- wnum: W023
  form: si-ki
  gloss: transmit a signal
  status: active
  lead_root: si
  type: compound
  class: process
  register: standard
  domain: communication
  definition: transmit; send a signal or message; directed point-to-point signal motion
  composition: si (signal/representation) + ki (motion) — the motion of a signal toward
    a recipient
  notes: 'Distinct from W021 si-ne-ki (communication/networking): si-ki is directed
    one-way transmission (signal + motion); si-ne-ki is relational communication (signal
    + relation + motion), implying a maintained connection or broadcast.

    Use si-ki for "send"; si-ne-ki for "communicate / network."'
  related: si-ne-ki (W021), si-ki-mu (transmitter / sender device)
  examples: '"la-ze  lo-si  ka-si-ki" — she sent the message (S017)'
  groups:
  - Signal / Communication
  first_use: S076
- wnum: W024
  form: fe-si
  gloss: warning, boundary-condition signal
  status: active
  lead_root: fe
  type: compound
  class: process / entity
  register: standard
  domain: general
  definition: warn; issue a warning or alert; a signal that marks a boundary or limit
    condition
  composition: 'fe (boundary/limit) + si (signal) — head-final: a signal characterized
    as boundary-marking; a signal that a limit is approaching, present, or has been
    crossed'
  notes: 'fe (boundary) characterizes warnings precisely: a warning signals that a
    limit exists, is approaching, or has been crossed. Preferred over de-si (decay-signal),
    which conflates the warning with the harm itself. head-final: si is the head (it
    is a signal); fe specifies what kind.'
  related: fe-si-mu (warning device / alarm), fe-ki (to reach a limit / become bounded)
  examples: '"ka-fe-si  ne-yu" — warn them / issue a warning to them "la-ze  lo-si  ka-si-ki-past  wi
    [ka-fe-si  ne-yu]" — she sent the message to warn them (S017)'
  groups:
  - Signal / Communication
  first_use: S109
- wnum: W025
  form: to-su-ki
  gloss: comprehend, enter organized knowledge
  status: active
  lead_root: to
  type: derivation (inchoative compound)
  class: process
  register: standard
  domain: knowledge
  definition: comprehend; come to understand; enter a state of organized knowledge
  composition: to-su (W030, organized knowledge) + inchoative -ki (enter state of)
    → the moment of grasping structure; arriving at organized understanding
  notes: 'Distinct from to-ki (W020, computation/reasoning process): to-ki is the
    ongoing act of processing; to-su-ki is the threshold moment of grasping organized
    structure.

    to-ki describes the journey; to-su-ki describes arrival.

    First attested: S018. Identified as W025 candidate in S018 corpus notes.'
  related: to-ki (W020), to-su (W030), to-su-li (expert / one who has comprehended)
  examples: '"la-yu  ka-to-ki  wi [ka-to-su-ki]" — they study in order to comprehend
    (S018)'
  groups:
  - Knowledge / Epistemic
  first_use: S642
- wnum: W026
  form: to-si
  gloss: query; proposition / thought-signal
  status: active
  lead_root: to
  type: compound
  class: entity / process
  register: formal
  domain: knowledge / communication
  definition: query; a signal seeking knowledge; the act or artifact of requesting
    information
  composition: 'to (knowledge/pattern) + si (signal/representation) — head-final:
    a signal whose content is a knowledge request; inquiry encoded as a signal'
  notes: 'Direction is inward (signal reaching for knowledge), distinct from si-ki
    (W023, transmit/send; signal moving outward). to-si is a content type; si-ki is
    a directional act. A to-si can be sent via si-ki: "la-mi  ka-si-ki  lo-to-si"
    —

    I transmitted the query.

    Needed to close S019 compound analysis.'
  related: si-ki (W023), to-ko (W027), to-su (W030)
  examples: 'S019 compound: ti-past-to-si-ko-mu — device that retains past queries'
  groups:
  - Knowledge / Epistemic
  first_use: S341
- wnum: W027
  form: to-ko
  gloss: memory, stored knowledge
  status: active
  lead_root: to
  type: compound
  class: entity / concept
  register: standard
  domain: knowledge
  definition: memory; retained or stored knowledge; the faculty or substrate of knowledge
    persistence
  composition: to (knowledge/pattern) + ko (containment) — knowledge held within;
    knowledge that persists rather than flows or processes
  notes: 'Colloquial compression pattern: ordinary speakers shorten the engineering
    compound ti-past-to-si-ko-mu (historical query archive) to to-ko or to-ko-mu in
    casual speech.

    Mechanism: (1) ti- dropped — living quality is contextually implied; (2) past
    dropped — the device is defined by its historical function; (3) to-si collapsed
    to to — lay speakers name the device by what it does for them (stores knowledge),
    not by its query mechanism; (4) -mu dropped by metonymy when the category referent
    is clear.

    This is the first documented casual compression in Tonesu. The pattern suggests:

    qualifier stripping + semantic nucleus retention + metonymic -mu drop.

    Formal rule for colloquial compression is pending (see notes/open-questions.md).'
  related: to-su (W030, organized structured knowledge), to-si (W026, query), to-ko-mu
    (memory device / formal compound)
  examples: '"to-ko-ka" — the act of remembering (to-ko + action marker ka) S019 fragment:
    to-si-ko-mu — device that contains queries'
  groups:
  - Knowledge / Epistemic
  first_use: S143
- wnum: W028
  form: to-fe
  gloss: epistemic boundary (the-line between knowledge states)
  status: pending
  lead_root: to
  type: compound
  class: entity / concept
  register: formal
  domain: knowledge / ethics
  definition: epistemic boundary; the categorical line between epistemic states; the
    principle that se/si/to/to-su are not interchangeable
  composition: to (knowledge/pattern) + fe (boundary/limit/category) — knowledge-boundary;
    the edge between one epistemic status and the next
  notes: 'Does not denote a boundary in physical space but a boundary in epistemic
    category.

    The root fe already covers all category-edges (physical, temporal, abstract);
    to-fe specifies the knowledge-category application.

    Derived forms: to-fe-ki (unintentional epistemic category confusion; honest error,
    accidental — entered a wrong epistemic category); to-fe-ka (deliberate epistemic
    boundary violation; see W029).

    The distinction between to-fe-ki and to-fe-ka mirrors Domain 2: the same ki/ka
    pair that separates natural transition from deliberate action.'
  related: to (W—), fe (primitive), to-fe-ka (W029)
  examples: '"the to-fe between observation and knowledge is fundamental to Tonesu
    discourse"'
  groups:
  - Knowledge / Epistemic
  first_use: S273
- wnum: W029
  form: to-fe-ka
  gloss: deliberate epistemic mislabeling
  status: pending
  lead_root: to
  type: compound
  class: process
  register: formal
  domain: ethics / knowledge
  definition: deliberate epistemic mislabeling; present information of one epistemic
    status as another, knowing the true status; epistemic fraud; intellectual misrepresentation
  composition: 'to-fe (W028, epistemic boundary) + ka (deliberate intentional action)
    —

    the intentional act of violating an epistemic category boundary; ka''s intentionality
    is what makes this fraud rather than error'
  notes: 'Cultural weight: in Tonesu formal discourse, to-fe-ka occupies the same
    severity as fraud or perjury in legal systems — a deliberate violation of the
    epistemic contract that makes shared knowledge trustworthy. In casual speech,
    imprecise epistemic marking is tolerated (same as English ''I know'' for ''I believe'');
    to-fe-ka requires both awareness of the mis-categorization and deliberate choice
    to misrepresent.

    Contrast: to-fe-ki (same boundary-crossing without intention; honest error; correctable
    through clarification). The ki/ka choice forces the speaker to commit to whether
    the violation was accidental or deliberate — the language does not allow convenient
    ambiguity on this point.

    This compound demonstrates the convergence of Domain 1 (epistemic precision) and
    Domain 2 (deliberateness)/Domain 4 (limits): Tonesu does not have a separate moral
    framework for intellectual honesty — epistemic fraud is a category of boundary
    violation, the same ontological class as approaching a physical limit.

    Directionality note: to-fe-ka covers boundary crossings in both directions.

    INFLATION: presenting se as to (overclaiming certainty). Assertive; visible; politically
    risky; the mislabeling is present in the claim itself.

    DEFLATION: presenting to-su as si (suppressing established status; denying a category
    upgrade that is warranted). Withholding; harder to prove; politically safer because
    the fraud lies in absence of promotion rather than a false claim.

    In Tonesu political practice, deliberate deflation is likely the more common form
    of to-fe-ka: a speaker who says ''this is only si'' when it has reached to-su
    status is doing something structurally distinct from one inflating speculation
    into fact. A to-fe-li adjudicating a deflation charge must establish what epistemic
    status the claim had actually reached — a higher evidentiary burden than inflation.'
  related: to-fe (W028), fe-si (W024), fe-ki (reach a limit)
  examples: '"calling se (perception) to (knowledge) is to-fe-ka" "la-ze  ka-to-fe-ka  lo-to-si"
    — she misrepresented the query as established knowledge'
  groups:
  - Knowledge / Epistemic
  first_use: C005-A3
- wnum: W030
  form: to-su
  gloss: organized knowledge, theory, model
  status: pending
  lead_root: to
  type: compound
  class: entity / concept
  register: standard
  domain: general
  definition: organized knowledge; system, model, framework, theory
  composition: to (knowledge/pattern) + su (structure)
  notes: 'to-su = committed/established framework (working theory promoted to structured
    knowledge). The approximation operator gives a useful distinction:

    ~to-su = tentative/working theory (a knowledge structure that is acknowledged
    as provisional). Contrast: to-su asserts organized structure; ~to-su marks the
    organization itself as approximate. This distinction is available without any
    new vocabulary.'
  related: to-su-mu (device), to-su-li (expert)
  examples: '"the to-su explained the phenomenon"'
  groups:
  - Knowledge / Epistemic
  first_use: S170
- wnum: W031
  form: ne-su
  gloss: network, society, organization
  status: pending
  lead_root: ne
  type: compound
  class: entity
  register: standard
  domain: social / technical
  definition: structured set of relations; network, society, web, organization
  composition: ne (relation) + su (structure)
  related: li-ne-su (social network), si-ne-su (communication network)
  examples: '"the ne-su of traders spanned three regions"'
  groups:
  - Social / Institutional
  first_use: S041
- wnum: W032
  form: to-fe-li
  gloss: epistemic guardian/adjudicator
  status: pending
  lead_root: to
  type: compound
  class: entity
  register: formal
  domain: knowledge / institutions / ethics
  definition: epistemic guardian; one with recognized social authority to adjudicate
    epistemic claims; knowledge auditor, peer reviewer, truth arbiter
  composition: to-fe (W028, epistemic boundary) + -li (social agent) — a person whose
    recognized social role is maintaining and adjudicating epistemic category integrity
  notes: 'Critically distinct from to-li (W003, knower/scientist): to-li produces
    knowledge; to-fe-li adjudicates it. The to-li asks: what is true? The to-fe-li
    asks: has the epistemic procedure been followed; is this claim''s category warranted?
    The role is institutional, not personal: a to-li becomes relevant by having knowledge;
    a to-fe-li is relevant by holding recognized authority to certify or contest epistemic
    categories in formal contexts.

    The existence of to-fe-li as a recognized social role is what gives to-fe-ka its
    cultural weight: fraud (to-fe-ka) is a charge that a to-fe-li can formally bring;
    without the role, the vocabulary is description only. With it, it is actionable.

    Structural mirror: to-fe-ka (boundary violation) ↔ to-fe-li (boundary upholder).

    The same root triple, opposite social functions.

    Unregistered institutional form: to-fe-su (the epistemic code / standards framework
    within which to-fe-li operate). Register when corpus demands it.

    Evidentiality pressure: to-fe-li have the strongest need for evidential markers
    (se-ro / si-ro / to-ro, pending) — adjudicating an epistemic claim requires specifying
    how the arbiter established the true status.'
  related: to-li (W003), to-fe (W028), to-fe-ka (W029), to-su-li
  examples: '"the to-fe-li reviewed the claim and confirmed it as to, not se" "la-to-fe-li  ka-to-fe-ki-past  lo-to-su"
    — the arbiter ruled the error unintentional'
  groups:
  - Person / Agent
  - Knowledge / Epistemic
  first_use: S045
- wnum: W033
  form: li-be
  gloss: child, person in growth phase
  status: active
  lead_root: li
  type: compound
  class: entity
  register: standard
  domain: social / general
  definition: child; young person; one in their growth phase
  composition: li (social agent/person) + be (growth/increase) — a person characterized
    by being in the growth phase of their development; not yet at full social standing
    or capability
  notes: 'Head-final: li (person) is the head; be specifies the life phase. Contrast
    li-de (a person in decay/late-life phase; not registered) and li-su-li (W001,
    one who organizes people). li-be is purely descriptive, not a social role.

    Does not require a dedicated "child" primitive: the growth-phase characterization
    is compositionally transparent.'
  related: 'li-su-li (W001), zo-li (compound: living-person)'
  examples: '"la-li-be  lo-ma  ka-ko" — the child drinks water (S020)'
  groups:
  - Person / Agent
  first_use: S020
- wnum: W034
  form: se-ka
  gloss: examination, deliberate inspection
  status: active
  lead_root: se
  type: compound
  class: process / entity
  register: standard
  domain: general
  definition: examination; act of deliberate perception; inspection, observation,
    survey
  composition: 'se (perception/sense) + ka (action) — head-final: an action characterized
    by being perceptual in nature; deliberate use of sensory/cognitive faculties to
    assess something'
  notes: 'When used verbally in a gloss, the form is "ka-se" (action particle + perception
    root).

    se-ka is the nominalized form: "the examination," "an inspection." Contrast with
    to-ki (W020, reasoning process): to-ki operates on knowledge already held; se-ka
    is directed outward at an object in the world. They often co-occur:

    careful inspection (se-ka) feeds into assessment (to-ki).'
  related: 'se (primitive: perception), to-ki (W020), to-su-ki (W025)'
  examples: 'verbal form: "la-su-mu-li  lo-mu  ka-se-past" — the engineer inspected
    the machine (S025)'
  first_use: S192
- wnum: W035
  form: de-be
  gloss: repair, restore
  status: active
  lead_root: de
  type: compound
  class: process
  register: standard
  domain: general / technical
  definition: repair; restore; reverse decay; bring back to functional state
  composition: 'de (decay/decrease) + be (growth/increase) — head-final: growth that
    is characterized as occurring after and in response to decay; recovery-growth;
    the specific form of increase that counteracts a prior decrease'
  notes: 'The de-be compound is semantically precise: not all growth is repair (ka-be
    covers creation from nothing), and not all decay states are followed by growth.

    de-be specifically encodes directional recovery: from-decay-toward-growth.

    Applicable to physical objects (repairing a machine), infrastructure, relationships,
    or any system that can decay and be restored.

    Contrast: ka-be (creation from scratch, S014); de (decay, no recovery, S026).'
  related: 'be (primitive: growth), de (primitive: decay), ka-be (create), ra-be (energy-growth)'
  examples: '"la-ze  lo-ze  ka-de-be-past" — she repaired it (S027) "ka-de-be" = the
    act of repairing'
  groups:
  - Relation / State / Quality
  first_use: S180
- wnum: W036
  form: li-pu-pa
  gloss: city, inhabited settlement
  status: active
  lead_root: li
  type: compound
  class: entity
  register: standard
  domain: social / geography
  definition: city; inhabited settlement; a place defined by the organized presence
    of many people
  composition: 'li (social agent/person) + pu (plurality/collective) + pa (place/space)
    —

    head-final: a place (pa) characterized by being the location of an organized collective
    (li-pu) of persons; the place whose defining feature is inhabited social organization'
  notes: 'When preceded by the location particle pa, the full form pa-li-pu-pa would
    be redundant (pa already supplies the location frame). The short form li-pu is
    used in particle-marked position: pa-li-pu = at/to the city.

    li-pu alone (without pa) = the city-community / the collective of urban persons,
    as a social entity rather than a physical place.

    Not to be confused with li-pu-su (city governance / urban administration structure),
    which is unregistered but derivationally available.'
  related: 'li (primitive: person), pu (primitive: plurality), pa (particle/primitive:
    place), li-su-li (W001, organizer/leader)'
  examples: '"pa-li-pu" — at the city / to the city (particle + colloquial short form)
    "wi [ka-ra-be  pa-li-pu]" — intention: restore energy to the city (S027)'
  groups:
  - Place / Space
  - Social / Institutional
  first_use: S061
- wnum: W037
  form: ti-fe
  gloss: deadline, temporal boundary
  status: active
  lead_root: ti
  type: compound
  class: entity / concept
  register: standard
  domain: general / technical
  definition: time-limit; deadline; the temporal boundary of a permissible or safe
    operating window
  composition: ti (time/sequence) + fe (boundary/limit) — a boundary in the dimension
    of time; the point past which a process has exceeded its safe or intended temporal
    envelope
  notes: 'Extends the fe consolidation principle (Domain 4: Limits and Thresholds)
    into the temporal dimension. Tonesu does not treat deadlines as social conventions
    separate from physical limits — both are species of fe. A ti-fe is as real as
    a ra-fe (energy boundary) or a to-fe (epistemic boundary): crossing it has consequences
    that follow from the same ontological category.

    The compound is head-final: fe (boundary) is the head; ti (time) specifies the
    dimension. Compare: to-fe (knowledge-boundary), ra-fe (energy-boundary, unregistered
    but derivationally available), wi-fe (intention-limit/ethical constraint, unregistered).

    Do not confuse with ti-fe-ki (reaching the time-limit, the crossing event) or
    re-ti-fe (a recurring deadline — deadline that repeats on a cycle).'
  related: 'fe (primitive: boundary/limit), ti (primitive: time), fe-si (W024: warning),
    fe-ki (reach a limit), to-fe (W028)'
  examples: '"ti-fe  ki-now" — [it is] approaching the time-limit now (C001)'
  groups:
  - Time
  first_use: S424
- wnum: W038
  form: ra-ki
  gloss: storm, kinetic-force discharge
  status: pending
  lead_root: ra
  type: compound
  class: entity / process
  register: standard
  domain: natural phenomena
  definition: 'violent energetic event; storm, surge, blast; natural kinetic-force
    discharge.

    The canonical term for a storm or any non-volitional release of concentrated energy
    in motion. Covers atmospheric storms, floods (in their kinetic expression), rockslides,
    etc. — any event where undirected `ra` (energy/force) becomes `ki` (motion at
    scale).'
  composition: 'ra (energy/force) + ki (motion) — energy in motion; the compound identifies
    an event as one whose defining characteristic is large-scale undirected kinetic
    energy release. Head-final: ki (motion) is the event type; ra specifies the substance/driver.'
  notes: 'Non-volitional by construction. A ra-ki cannot be the `la` agent of a `ka`
    (intentional action) verb — it only appears with `de` (non-intentional decay),
    `be` (non-intentional production), or bare state predicates. This distinguishes
    it cleanly from all animate agents.

    Contrast ra-ki-mu (W012: engine / machine) — an artifact that deliberately converts
    energy in motion. W012 is a manufactured object; W038 is a natural event.

    The shared `ra-ki` root expresses the same physical relationship (energy → motion)
    but the mu suffix in W012 adds the artifact frame, changing it from an event to
    a tool. W038, lacking mu, is raw event.

    Derivationally available extensions:

    ra-ki-fe = the boundary of the storm (its extent or the point where its energy
    is spent); unregistered la-ra-ki = "agent: storm" in a causal frame (see S028);
    the storm as causal source Do not confuse with ra-be (energy-generation, unregistered
    but legal), which would describe a source that produces energy, vs ra-ki which
    describes energy already in motion.

    TRIAGE NOTE (March 2026): 1 standalone corpus attestation (S028). Heavily used
    as a component of ra-ki-mu, ra-ki-li, etc., but rarely stands alone. Promote when
    a second independent attestation of the bare event form is added.'
  related: 'ra (primitive: energy/force), ki (primitive: motion), ra-ki-mu (W012:
    engine), go (primitive: causation), de (primitive: decay/deterioration)'
  examples: '"go [la-ra-ki  lo-su-mu  de]  du [de-ki]" — because the storm decayed
    the structure, result: collapse (S028)'
  groups:
  - Energy / Matter / Physics
  first_use: S028
