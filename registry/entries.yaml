- wnum: W132
  form: wi-no-ra
  gloss: meekness, will-without-force
  status: active
  lead_root: wi
  type: compound
  class: quality / disposition
  register: standard / ethical
  domain: ethics / affect
  definition: 'meekness; gentleness; the quality of purposeful will without aggressive
    force. Being intentional and directed without dominating or overwhelming.

    Not absence of will but presence of will without force applied against others.
    Greek praus (gentle, meek, tame — of a trained horse).'
  composition: 'wi (will/intention) + no (negation/absence) + ra (force/energy) =
    will-without-force = the purposive quality of having intention without directing
    force against others. Head-final: ra (force) is head; wi-no specifies the kind
