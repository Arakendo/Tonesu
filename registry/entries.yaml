  gloss: feedback loop, iterative goal-cycle
  status: active
  lead_root: wi
  type: compound
  class: process / structure
  register: standard / technical
  domain: systems / cognition / operations
  definition: feedback loop; goal-cycle; iterative regulation toward a target state;
    the recurring structure of pursuing a goal, sensing deviation, and correcting
  composition: 'wi (will/intention) + re (repetition/cycle) — will that loops: a purpose
    that drives iterative cycles of action and correction rather than being fulfilled
    in a single act. Head: re (the cycling); wi specifies the cycling is goal-directed,
    not merely rhythmic.'
  notes: 'Registered after formal application of the three primitive validation rules
    showed "control" does not qualify as a primitive: concept fully decomposes into
    wi (goal) + se (sense deviation) + re (iterate) + be/de (correct).

    wi-re names the structural mechanism — the goal-driven loop itself.

    Canonical extension forms:

    wi-re-mu  = governor / regulator device wi-re-li  = controller / operator (agent
    instantiating the loop) wi-re-ka  = act of regulating / governing Collision note:
    wi-re-su is already committed as W074 (protocol / standing procedure), where it
    names an institutional recurring structure across instances. W074 sense differs:
    protocol recurs across contexts (each fire drill is one instance of the protocol);
    feedback loop cycles within a single running process (the thermostat never "completes"
    one cycle and starts a new one — it is continuously looping). Both are legitimate
    wi-re compounds; W074 takes precedence for the institutional-procedure reading.
    The regulated-system sense (if needed) should use wi-re-go-su or be handled contextually
    rather than reopening W074.'
  related: wi (will), re (repetition/cycle), wi-re-su (W074, protocol), se (perception
    — sensing the deviation), be/de (correction direction), wi-to (W045, plan — single-instance,
    compare with wi-re's iterative nature)
  first_use: S179 (`go [la-su  se  lo-su]  la-su  wi-re` = "Because the system perceives
    itself, the system regulates." — OPX-001-D, Observer Paradox stress test)
  groups:
  - Social / Institutional
