- wnum: W128
  form: ka-de-zo
  gloss: kill, deliberate ending of life
  status: active
  lead_root: ka
  type: compound
  class: action / process
  register: standard / ethical / legal
  domain: ethics / law / biology
  definition: to kill; the deliberate act of decreasing a living thing to the point
    of cessation. The intentional ending of the zo-ra (life-energy) of an organism.
    Greek apokteinō (to kill, slay); Hebrew ratsach (murder).
  composition: 'ka (deliberate action) + de (decrease) + zo (living thing) = deliberate
    decrease of living = intentional killing. Head-final: zo (living thing) is the
    patient/head; de specifies the direction (decrease to zero); ka specifies the
    action is intentional.'
  notes: 'ka-de-zo is murder/killing as a deliberate act (ka). Accidental or non-deliberate
    death would be `de-zo` (without ka) = organism-decrease = dying/death. The ka
    modifier makes it morally significant: intentional vs accidental.

    Note: "Do not kill" is `no-ka-de-zo`, but the antithesis extends to `fa-ra-be`
    (W123, anger) — the interior state that motivates ka-de-zo.

    The ethical point of the antithesis is that the interior state is as morally relevant
    as the external act.'
  related: 'ka (primitive), de (primitive), zo (primitive), fa-ra-be (W123: anger),
    zo-ra (W117: life-energy)'
  first_use: Matthew 5:21 ("do not murder" = `no-ka-de-zo  lo-li-zo-ne`).
  groups:
  - Organism / Biology
- wnum: W129
  form: no-de-ma
  gloss: salt, preservative matter
  status: active
  lead_root: 'no'
  type: compound
  class: entity / material quality
  register: standard / culinary / metaphorical
  domain: material / ethics (metaphorical)
  definition: 'salt; preservative matter; substance that resists or prevents decay.

    The material form notable for its decay-resisting function. Greek halas (salt)
    in its metaphorical Sermon usage: "you are the salt of the earth."'
  composition: 'no (negation/resistance) + de (decrease/decay) + ma (matter) = non-

    decay matter = matter that resists the decay process. Head-final: ma (matter)
    is head; no-de specifies the kind of matter — that which prevents decrease.'
  notes: 'The metaphorical use (Matthew 5:13) is the primary Tonesu attestation.

    The compound is structurally transparent in both directions: physical salt (a
    material that prevents rot) = no-de-ma; also the figurative sense (a community
    that prevents moral decay in the world) = `la-yu  no-de-ma go-pa-ma`. The compound
    carries both readings simultaneously.

    "If salt loses its saltiness" = "if the no-de-ma loses its no-de quality" = `lo-no-de-ma  no-de-vo  de`
    = the preservative''s decay-

    resistance value decays away.'
  related: 'no (primitive), de (primitive), ma (primitive), ma-no-de (W046: medicine
    —

    note: different root order; W046 = matter that decreases-not = preventive substance;
