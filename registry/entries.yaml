- wnum: W228
  status: active
  form: ki-fe-mu
  written: kifemu
  gloss: fundamental string; 1D vibrating entity; oscillating boundary object
  lead_root: ki
  type: compound
  class: entity (theoretical construct)
  register: scientific / formal
  domain: physics / theoretical / string theory
  definition: 'The fundamental theoretical object of string theory: a 1D entity (boundary/limit
    in one spatial direction) that oscillates (is in vibrational motion). All particles
    and forces are hypothesized to be different vibration modes (ki-be) of this entity.
    Distinct from a macroscopic string or filament — ki-fe-mu is a quantum-scale entity
    at or near the Planck length, not directly observable. The compound encodes both
    its geometric character (fe: 1D boundary) and its defining physical behavior (ki:
    oscillation/motion).

    '
  composition: 'ki (motion/oscillation) + fe (boundary/limit) + mu (artifact/entity).
    Head-final: mu (artifact) is head; ki modifies [fe-mu]. fe-mu = the boundary-artifact
    = a 1D delimited entity. ki-fe-mu = the 1D entity in oscillatory motion = vibrating
    string. The right-branching parse captures the ontology: a string is a boundary-
    artifact (fe-mu) in motion (ki).

    '
  notes: 'String theory posits that ki-fe-mu replaces the point-particle (pe-ma) as
    the fundamental constituent of nature. Different vibrational modes (ki-be) of
    the same ki-fe-mu produce different particles (leptons, quarks) and force carriers
    (photon, graviton). In M-theory (11-dimensional string theory), ki-fe-mu extends
    to higher-dimensional objects (branes), but ki-fe-mu names the 1D string specifically.
    First attested STR-001 (S726).

    '
  related: 'pe-ma (particle: matter-component, anchor-inventory), ki-be (vibration-mode:
    motion-structure, compositional first use STR-001), pa-di (W229: dimension), su-ne
    (W174: structural harmony / unification)

    '
  first_use: 'STR-001-A (S726): go {ki-fe-mu},  la-pe-ma  ne  ki-be'
  groups:
  - Physics / Theoretical
  - Foundations / Quantum
  - Science / Formal
- wnum: W229
  status: active
  form: pa-di
  written: padi
  gloss: dimension; spatial direction; independent axis of extension
  lead_root: pa
  type: compound
  class: property (geometric)
  register: scientific / formal
  domain: physics / mathematics / geometry
  definition: 'An independent axis or direction of spatial extension. In 3-dimensional
    familiar space there are three pa-di (left-right, forward-back, up-down). In M-theory
    there are eleven. A pa-di is the minimal unit of spatial independence: one degree
    of freedom in position. The compound encodes this directly: pa (space/place) +
    di (direction) = a direction through space. Counts with nu: bol bol nu pa-di =
    eleven dimensions. Compactified dimensions: ko-pa-di (enclosed-spatial-direction),
    where ko (containment) marks the dimension as rolled up to Planck scale.

    '
  composition: 'pa (space/place) + di (direction). Head-final, 2-root compound: di
    (direction) is head; pa (spatial) specifies that this is a spatial direction as
    opposed to a purely conceptual or mathematical direction. pa-di = the direction
    within space = spatial dimension.

    '
  notes: 'pa-di covers both spatial and temporal dimensions when used in physics discourse,
    where "dimension" encompasses all coordinate degrees of freedom including time.
    When precision matters, the temporal dimension is ti-di (time-direction) and spatial
    dimensions are pa-di strictly. In the 11-dimension M-theory context, 4 large dimensions
    (3 pa-di + 1 ti-di) are observable, and 7 ko-pa-di (compactified spatial directions)
    are not. STR-001 uses pa-di for all 11 dimensions inclusively, with a note marking
    the ti-di distinction. First attested STR-001 (S727).

    '
  related: 'pa (space, primitive), di (direction, primitive), ko-pa-di (compactified
    dimension: containment-spatial-direction, compositional), ki-fe-mu (W228: fundamental
    string), bol bol nu pa-di (eleven dimensions, count construction)

    '
  first_use: 'STR-001-B (S727): la-pa  ne  bol bol nu pa-di'
  groups:
  - Physics / Theoretical
  - Mathematics / Geometry
  - Science / Formal
- wnum: W230
  status: active
  form: wi-no
  written: wino
  gloss: unwillingness; not-wanting; reluctance
  domain: Agency / Affect / Ethics
  pos: predicate compound / quality
  register: standard
  lead_root: wi
  type: compound
  class: quality / state
  etymology: wi (will/intention) + no (negation/absence) = will-absent = the state
    of not willing; having one's intention directed away from something rather than
    toward it. The will is present as a faculty but is not engaged with — or is actively
    opposed to — the thing in question.
  definition: 'unwillingness; the state of not-wanting; reluctance to be engaged with
    something. The will is not aligned with the current situation.

    Distinct from bare no-wi (momentary action-negation: "do not will X") — wi-no
    names the sustained quality/state: "I am in a state of not-willing."

    Parallel to fa-no (W095, affect-absent): as fa-no is the affective substrate that
    is not present, wi-no is the will that is not present or not engaged.'
  composition: 'wi (will/intention) + no (negation/absence). Head-final: no (absence)
    is head; wi specifies whose absence — the will itself. wi-no = the-absence-of-will
    = unwillingness.'
  notes: 'Usage: la-mi wi-no lo-X = I am unwilling toward X / I do not want X; la-X
    wi-no = X is unwilling; wi-no as predicate = the unwillingness itself.

    Contrast: wi-no-ra (W131, meekness = will-without-force) — different compound:
    wi-no-ra right-branches as wi-(no-ra) = will of [no-force]; wi-no left-branches
    as (wi-no) the unified state. Confirm parse by context: wi-no as predicate = unwilling;
    wi-no-ra = will-without-giving-force = meek.

    The opening of the Sanguinius speech (SNG-001) first attests this compound — a
    commander admitting reluctance before his troops, a structural impossibility in
    many rhetorical registers but natural in Tonesu: the language enforces honesty
    of attribution.'
  related: 'wi (primitive: will/intention), no (primitive: negation), fa-no (W095:
    affect-absent — parallel structure), wi-no-ra (W131: meekness — related but distinct
    parse)'
  first_use: 'SNG-001-A (S732): la-mi  wi-no  lo-fe-su — "I do not want to be here
    [at this wall]."'
  groups:
  - Agency / Will
  - Affect / Emotional substrate
- wnum: W231
  status: active
  form: de-vo
  written: devo
  gloss: shame; loss of worth; dishonour
  domain: Ethics / Affect / Social
  pos: predicate compound / quality / noun
  register: standard
  lead_root: de
  type: compound
  class: quality / state / event
  etymology: 'de (decrease/decay) + vo (worth/value/quality) = decrease-in-worth =
    the diminishment of one''s standing, honour, or self-worth. Head-final: vo (worth)
    is the domain; de (decrease) specifies the direction.'
  definition: 'shame; loss of worth; dishonour; the state or process of one''s worth
    diminishing. Covers: the acute felt experience of having done something beneath
    one''s worth; the social collapse of standing; the diminishment of dignity.

    Used as predicate: la-X de-vo = X is in a state of shame/dishonour. Used as noun/patient:
    lo-de-vo = the shame itself; no de-vo = not in shame.

    Antonym: wi-vo (W190, will toward worth = honour-disposition = the stance that
    produces and maintains worth).'
  composition: 'de (decrease/decay) + vo (worth/value). Head-final: vo (worth) is
    head; de specifies that the worth is undergoing decrease. de-vo = worth-decrease
    = shame/dishonour.'
  notes: 'Paired contrast with wi-vo (W190): de-vo (shame) / wi-vo (honour-disposition)
    is the antithetical pair in Sanguinius''s permission-to-flee speech: "no de-vo
    / wi-vo" = "not in shame / [but] in honour."

    Distinct from: fa-de (W094, affective decrease = distress): fa-de is quantitative
    affect-diminishing; de-vo is worth/dignity diminishing. The two can co-occur (shame
    is often accompanied by distress) but they name different dimensions.'
  related: 'de (primitive: decrease/decay), vo (primitive: worth/value), wi-vo (W190:
    honour-disposition — antonym), fa-de (W094: distress — related but distinct),
    vo-ne (W118: righteousness)'
  first_use: 'SNG-001-E (S736): no de-vo / wi-vo — "Not in shame / [but] with honour."'
  groups:
  - Ethics / Social
  - Affect / Emotional substrate
