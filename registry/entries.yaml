entries:
- wnum: W000
  form: to-ne-su
  gloss: truth; the language itself
  status: active
  lead_root: to
  type: compound
  class: entity / concept
  register: formal → casual
  domain: general / meta / philosophy
  definition: 'truth; complete structured knowledge; the language itself. The word
    means both simultaneously and by design: the language is named after its own aspiration.

    to-ne-su = the condition of patterns held together in structure = truth as an
    organized relational whole, not a proposition but a state of coherent knowledge.'
  composition: to (pattern/thought) + ne (relation/connection) + su (structure/order)
  notes: 'The language name and the word for truth are the same word. This is intentional:

    speaking Tonesu is an act of reaching toward truth; the language is named after
    what it aspires to express.

    Dual use is not ambiguity — in any sentence, "tonesu" names either the language
    (used as a proper noun) or the concept (used as a common noun); context resolves
    the reading without structural change.

    The ~tonesu derivation is particularly useful: ~tonesu = approximately truth =
    a theory, a hypothesis, a working model. The approximation operator applied to
    the word for truth gives you conjecture. This is available without any new vocabulary
    and captures the epistemic gradient from ~tonesu (conjecture) through si (hypothesis)
    to to-ne-su (established truth / organized knowledge).

    Compression: tonesu follows the same middle-drop pattern as zol/zof — to + [ne
    dropped contextually] + su → tonesu. First documented compression in the language.'
  related: 'to (pattern/knowledge), ne (relation), su (structure), ~tonesu (theory/conjecture),
    to-su (W030, organized knowledge — narrower: structured knowledge without the
    relational coherence claim that ne adds), to-to-ne-su (W169, knowledge of truth
    / the language in use), to''to-ne-su (W170, meta-truth / analytic knowledge of
    Tonesu)'
  examples: '"this sentence is written in to-ne-su" / "I speak tonesu" "la-mi  to  lo-tonesu"
    — I hold truth (I know the truth / I assert the fact) "~tonesu" — approximately
    truth = theory, conjecture, working model'
  groups:
  - Knowledge / Epistemic
  first_use: S636
