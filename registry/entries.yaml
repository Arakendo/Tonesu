  type: compound
  class: affect state / process
  register: standard / ethical / theological
  domain: ethics / theology / affect
  definition: temptation; the affective state in which desire (will) is directed toward
    something harmful (decrease). The pull of the affective substrate in the direction
    of harm; the interior experience of being drawn toward wrong action. Greek peirasmos
    (trial, temptation, testing).
  composition: 'fa (affective substrate) + wi (will/intention) + de (decrease/harm)
    = affect-will-toward-decrease = the felt directedness of desire toward harm. Head-final:
    de (decrease) is head, specifying what the affect-will is oriented toward.'
  notes: 'fa-wi-de-ki = entering temptation state (inchoative); the most common form
    in use: "don''t lead us into fa-wi-de-ki" = into the state of being tempted. The
    "-ki" form signals the onset of the temptation experience, not just temptation
    as a concept.

    Compare: fa-wi-zi (W128 area; desire-to-couple = lust) — that is a specific sub-type
