- wnum: W224
  status: active
  form: ka-si-de
  written: kaside
  gloss: deliberate deception; strategic misdirection; intentional signal-corruption
  lead_root: ka
  type: compound
  class: process / action
  register: standard
  domain: military / conflict / social / epistemics
  definition: 'the deliberate act of corrupting or degrading a signal to mislead a
    recipient; strategic deception; misdirection. Default right-branching parse: ka
    modifies [si-de], where si-de = signal-decrease = the reduction of signal fidelity.
    Ka-si-de = intentional [signal-decrease] = deliberate degradation of information
    fidelity for strategic purposes. Distinguished from simple ignorance (absence
    of knowledge) by the ka (intentionality) component: ka-si-de is always an agentive
    act, not an accident or omission.

    '
  composition: 'ka (deliberate action) + si (signal/information channel) + de (decrease/harm/corruption).
    Default right-branching: ka modifies [si-de]. Si-de = signal-decrease; ka-si-de
    = intentional [signal-decrease] = deliberate signal-corruption = deception.'
  notes: 'First attestation AOW-001-A (S702). Sun Tzu''s foundational axiom "all warfare
    is based on deception" is rendered as a-ka-ra ne go-si ka-si-de. The three-root
    compound carries ka (intentionality), si (information/signal), and de (decrease/corruption):
    deception as intentional information degradation, not mere falsehood-utterance.
    Consistent with an information-theoretic analysis of deception: lying is a signal
    manipulation that reduces the recipient''s epistemic access to states of the world.'
  related: 'ka (deliberate action), si (signal/information), de (decrease/harm), si-de
    (signal-degradation — compositional), ka-ra (W222: combat), to-no-fe (omniscience
    — the no-fe extremal of to: maximum knowledge, contrast term for ka-si-de)'
  first_use: 'AOW-001-A (S702): a-ka-ra ne go-si ka-si-de'
