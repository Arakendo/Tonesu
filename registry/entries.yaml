  first_use: S434 — ko-mu-ze  ne  ti-be-ne-to-fe  ro-zo-ki'ma-mi (this cup is the
    new covenant through my blood)
  groups:
  - Social / Institutional
- wnum: W166
  form: to-ko-re
  gloss: remembrance, memory-return
  status: active
  lead_root: to
  type: compound
  class: action / concept
  register: general / liturgical / theological
  domain: theology / liturgy / memory
  definition: 'remembrance; commemorative memory-return. The deliberate or ritual
    act of returning to stored knowledge of a person or event. Specifically: the Eucharistic
    anamnesis (ἀνάμνησις) —

    not merely recalling, but actively re-presenting the founding event. The `re`
    (return/cycle) element captures the recurring re-enactment dimension: each performance
    is a return to the founding event.'
  composition: to-ko (memory/stored knowledge, W027) + re (return/cycle, primitive)
    = memory-return = the act of returning to what is stored in memory = remembrance/anamnesis.
  notes: 'The founding command of the Eucharist runs on one new compound carrying
    an ancient theological weight. to-ko-re encodes the Eucharistic structure: a deliberate
    act performed for the purpose of epistemic return (to-ko-re) to the founding speaker.

    The suffix -mi (my/mine) on to-ko-re gives "my remembrance" = the remembrance
    directed at/belonging to the speaker. Not "remember generally" but "remember me"
    = to-ko-re-mi.

    CLQ-EXT candidate: ka-to-ko-re-mi (deliberate-remember-me) as a compressed liturgical
    token; gated on 3 independent natural corpus attestations.'
  related: 'to-ko (W027: memory/stored knowledge), re (primitive: return/cycle), ka
    (primitive: deliberate action — ka-to-ko-re = to remember [verb])'
  verbal_form: 'ka-to-ko-re = to deliberately remember/commemorate (with ka-

    prefix). Used in the imperative: ka  lo-ze  to-ko-re-mi = "do this [as] my remembrance"
    (S432).'
  first_use: S432 — ka  lo-ze  to-ko-re-mi (do this [as] my remembrance)
  groups:
  - Knowledge / Epistemic
- wnum: W167
  form: ka-pa-ki'ti-re
  gloss: Passover festival, recurring liberation event
  status: active
  lead_root: ka
  type: compound
  class: event / festival
  register: theological / liturgical / cultural
  domain: theology / Jewish tradition / liturgy
  definition: 'Passover; the annual liberation festival. The historically recurring
    deliberate liberation event. `ka-pa-ki` (W160, liberation act = deliberate place-motion)
    + `''ti-re` (W103, recurring cycle). The juncture mark is required: `ka-pa-ki`
    is the pre-bound liberation-act unit; `ti-re` adds the annual recurrence. Written:
    `kapaki''tire`.'
  composition: 'ka-pa-ki (W160: liberation act, deliberate place-motion) + '' (juncture
    mark: left-bind ka-pa-ki as subcompound) + ti-re (W103: recurring temporal cycle)
    = [liberation-act] recurring annually = the Passover festival.

    Parse: `ka-pa-ki''ti-re` = [ka-pa-ki] modified by [ti-re] = the recurring liberation
    event = Passover.

    Without juncture, ka-pa-ki-ti-re (5 morphemes) would parse right-branching: ka
    modifies [pa-ki-ti-re], which loses the liberation-act base. Juncture is mandatory
    here.'
  notes: 'Passover encoded as the recurring liberation act: each year''s festival
    is a re-enactment of ka-pa-ki (the Exodus liberation, W160). This grounds the
    Last Supper''s Passover context: Jesus'' last supper IS the Passover meal — ka-pa-ki''ti-re
    is both the events-of-the-night category and the founding liberation it commemorates.

    Connection to EXO-001: ka-pa-ki (W160) was the Exodus liberation act. ka-pa-ki''ti-re
    adds the liturgical recurrence dimension at Sinai.'
  related: 'ka-pa-ki (W160: liberation act — the base compound), ti-re (W103: recurring
    cycle — the festival dimension), ka (primitive: deliberate action), pa (primitive:
    place), ki (primitive: motion)'
  first_use: S418 — ti-mi  ne  ka-pa-ki'ti-re (Now is the Passover)
  groups:
  - Ritual / Sacred
- wnum: W168
