    both dimensions; Tonesu captures the relational dimension through ne.

    vo-ne as predicate: `la-X vo-ne` = X has right-relational-quality.

    As patient: `lo-vo-ne` = the quality of righteousness as a thing to seek or have.
    "Hunger for righteousness" = `fa-wi lo-vo-ne` (Matthew 5:6).'
  related: 'vo (primitive: value/quality), ne (primitive: relation/bond), su-fa (W133:
    purity of inner affect), wi-no-ra (W132: meekness), fa-vo (compassion compound)'
  first_use: 'Matthew 5–7 translation (SOM draft). Recurs throughout: Beatitudes (5:6,
    5:10), antitheses (fulfilling the law), Lord''s Prayer context, etc.'
  groups:
  - Ritual / Sacred
- wnum: W119
  form: de-su
  gloss: fault, wrong, moral failing
  status: active
  lead_root: de
  type: compound
  class: entity / moral quality
  register: standard / ethical / theological
  domain: ethics / law / theology
  definition: 'fault; wrong; a moral or relational failure; the product of decrease
    applied to structure. The concrete result-thing of a moral failing.

    Covers: trespass, sin, wrong done, fault that requires addressing.

    Greek hamartia (sin/missing the mark) and opheilēma (debt/obligation).'
  composition: 'de (decrease/decay) + su (structure/product) = decay-product = the
    structured thing that results from moral decrease. Head-final: su (structure/organized
    form) is head; de specifies that the structure is one produced by a deficiency
    or decrease — a fault-shape.'
  notes: 'The compound''s logic: su forms the nominal of any process. de-su = "the
    structured result of decrease" = a fault-token that now exists and can be addressed.
    This is why forgiveness is ka-no-de-su: the deliberate removal of the fault-product.
    The fault exists as an entity (it was produced); forgiveness removes that entity.

    Contrasts:

    de         = the process of decreasing/decaying (action/state) de-su      = the
    product of that process = the fault-record de-vo      = the quality of being evil
    (W121) ka-no-de-su = the act of removing the fault-record = forgiveness (W120)'
  related: de (primitive), su (primitive), ka-no-de-su (W120), de-vo (W121)
  first_use: 'Matthew 5–7 translation (Lord''s Prayer: "forgive us our de-su").'
  groups:
  - Social / Institutional
- wnum: W120
  form: ka-no-de-su
  gloss: forgiveness, deliberate removal of fault
  status: active
  lead_root: ka
  type: compound
  class: action / process
  register: standard / ethical / theological
  domain: ethics / theology / social
  definition: forgiveness; the deliberate act of removing a fault-record; to dissolve
    the moral debt or trespass that exists as a de-su. The volitional removal of a
    standing wrong. Greek aphiēmi (release/forgive).
  composition: ka (deliberate action) + no (negation/removal) + de-su (fault/wrong,
    W119) = deliberately-remove-fault-structure. The agent `ka`-performs the `no`-removal
    of the `de-su` (fault-record). Four-syllable compound permitted as a semantically
    complex derived form.
  notes: 'The structure of the action: ka = agent does it deliberately; no = the act
    is a removal/negation; de-su = the entity removed is the fault-record.

    This is transitive: `la-X  lo-de-su  ka-no` = X removes [the specific fault],
    or (with patient as beneficiary) `la-X  lo-de-su-Y  ka-no` = X removes Y''s fault-record.
    In the Lord''s Prayer the beneficiary prefix appears: `la-tu  lo-de-su-yu  ka-no`
    = you: remove our fault-records.

    Lord''s Prayer bilateral: `lo-de-su-yu  ka-no  go-[la-yu  lo-de-su-li-ne  ka-no]`
    = remove our faults as we remove the faults of those-in-relation-to-us.'
  related: 'ka (primitive: deliberate action), no (primitive: negation), de-su (W119:
    fault/wrong), de-vo (W121: evil quality)'
  first_use: 'Matthew 5–7 translation (Lord''s Prayer: "remove our faults"; 6:14–15).'
  groups:
  - Social / Institutional
- wnum: W121
  form: de-vo
  gloss: evil, value-corruption quality
  status: active
  lead_root: de
  type: compound
  class: quality / moral state
  register: standard / ethical / theological
  domain: ethics / theology
  definition: 'evil; the quality of moral decay; value-corrosion; the state of being
    organized around decrease in value. Not a thing but a quality: the property of
    choices, agents, or states characterized by the corruption of goodness. Greek
    ponēros (evil, wicked, harmful).'
  composition: 'de (decrease/decay) + vo (value/quality) = decay-of-value. Head-final:

    vo (value) is head; de specifies that the value in question is undergoing or has
    undergone decrease/corruption.'
  notes: 'Key derivatives:

    de-vo-li   = a person characterized by evil = an evil person de-vo-ki   = entering
    evil state = becoming corrupt (inchoative) pa-de-no-fe = place of boundless decay
    = Gehenna/hell (proposed; SOM-002, pending corpus test) Contrast with:

    de-su  (W119) — a fault-product (countable, addressable wrong) de-vo  — the quality
    itself (uncountable, characterizes agents/states) "Evil" in the Lord''s Prayer
    "deliver us from evil": `go-de-vo  fe` = bound us from the domain of evil-value
    = from the sphere of de-vo.'
  related: de (primitive), vo (primitive), de-su (W119), ka-no-de-su (W120), de-vo-li
    (evil person derivation)
  first_use: 'Matthew 5–7 translation (Lord''s Prayer: "deliver us from de-vo"; 7:11
    "evil gifts"; Matthew 5:45 "evil person" = de-vo-li).'
  groups:
  - Social / Institutional
- wnum: W122
  form: ka-to-fe
  gloss: judge, deliberate epistemic bounding
  status: active
  lead_root: ka
  type: compound
  class: action / process
  register: standard / ethical / legal / theological
  domain: ethics / law / theology
  definition: to judge; the deliberate act of making an epistemic determination about
    a person or situation — rendering a verdict or assessment that places the subject
    definitively on one side of an epistemic boundary. The volitional act of adjudication.
    Greek krinō (judge, evaluate, condemn).
  composition: 'ka (deliberate action) + to-fe (epistemic boundary, W028) = deliberate
    epistemic bounding = the act of performing to-fe on a person or case.

    The agent intentionally draws the epistemic line that classifies the subject.
    Head-final: to-fe (W028) is the semantic core; ka specifies that this is a deliberate
    act, not an emergent classification.'
  notes: 'Extends the to-fe family:

    to-fe         (W028) the epistemic boundary itself (noun: the line) to-fe-li      (W032)
    a professional adjudicator (role) to-fe-su      (W072) a standards body to-fe-su-ki   (W097)
    an epistemic ruling crossing to public enforcement ka-to-fe      (W122) the deliberate
    act of judging (verb) Matthew 7 usage: `no-ka-to-fe` = don''t-judge. The point
    is the deliberateness: casual assessment is `to` (form a concept/model); final
    adjudication of a person as guilty/just is `ka-to-fe` (deliberate boundary-drawing).

    `to-fe  be-ki` = enters the judged-state = subject to judgment (passive construction
    — being placed on the wrong side of the boundary).'
  related: to-fe (W028), to-fe-li (W032), to-fe-su (W072), ka (primitive)
  first_use: Matthew 7:1 ("Do not judge" = `no-ka-to-fe`).
  groups:
  - Knowledge / Epistemic
- wnum: W123
  form: fa-ra-be
  gloss: anger, hostile arousal
  status: active
  lead_root: fa
  type: compound
  class: affect quality / process
  register: standard / ethical / theological
  domain: affect / ethics
  definition: anger; hostile arousal; affect characterized by force increasing toward
    a target. The affective substrate state in which force-energy rises in a directed
    and hostile manner. Not just heightened arousal but organized toward opposing
    or harming. Greek orgē (anger, wrath).
  composition: fa (affective substrate) + ra (force/energy) + be (increasing/upward)
    = affect-force-increasing. The affect-substrate is activated in the direction
    of increasing force, and this force is directed hostilely.
  notes: 'Extends the fa-[X] compound family:

    fa-ki  (W093) affect shifting/changing register fa-de  (W094) affect fading fa-no  (W095)
    affect inactive fa-re  (W096) affect cycling fa-ra-be     anger (new: affect-force-increasing)
    fa-de-ki     mourning (inchoative of W094: entering fading-affect) Anger is specifically
    fa-ra-be (versus mere fa-be = affect-rising, which could be positive excitement
    or awe). The ra component specifies that what is rising is force-energy, and the
    target is another person.

    fa-ra-be does not require external expression: it is the interior state.

    The acted form would be `ka-fa-ra-be-ki` = deliberately enter/induce the hostile-affect-rising
    state (deliberately provoke anger), but the simple predication `lo-X  fa-ra-be`
    = X has rising hostile affect.'
  related: 'fa (primitive: affective substrate), ra (primitive: force/energy), be
    (primitive: growing/increasing), fa-ki (W093), fa-de (W094)'
  first_use: Matthew 5:22 ("anyone who is angry" = `fa-ra-be  lo-ne-zo-ne`).
  groups:
  - Affect / Emotional substrate
- wnum: W124
  form: wi-de-li
  gloss: adversary, enemy, opposing-will person
  status: active
  lead_root: wi
  type: compound
  class: person / role
  register: standard / ethical / military / relational
  domain: ethics / social
  definition: adversary; enemy; an opposing-willed person; one whose will is directed
    toward the decrease or harm of another. Not merely a stranger or non-ally but
    one who actively opposes. Greek echthros (enemy, hostile one).
  composition: 'wi (intention/will) + de (decrease/harm) + li (person) = person-of-

    harm-directed-will = a person whose intention is organized around causing decrease.
    Head-final: li (person) is head; wi-de specifies the kind of person — one whose
    will tends toward harm.'
  notes: 'Complements the ne (bond) family by specifying the opposite of a bonded
    partner. ne-li = a bonded relational person (neighbor/ally); wi-de-li = a person
    whose will is against you (enemy). The Sermon on the Mount explicitly requires
    loving wi-de-li — the compound needs to be negative enough that the command is
    genuinely demanding.

    Contrasts:

    ne-li      = person in bond-relation = neighbor wi-de-li   = person of harm-directed-will
    = enemy no-ne-li   = person without bond = stranger (weaker than enemy) "Love
    your enemies" in Matthew 5:44 uses fa-vo-no-fe (W series THO-001) = affect-value-without-limit
    = unconditional love directed at wi-de-li.'
  related: 'wi (primitive: will/intention), de (primitive: decrease), li (primitive),
    ne-li (bonded-person, from ne + li), fa-vo-no-fe (unconditional love)'
  first_use: Matthew 5:44 ("love your enemies" = `fa-vo-no-fe  lo-wi-de-li-tu`).
  groups:
  - Person / Agent
  - Social / Institutional
- wnum: W125
  form: pa-be'ka-li-su
  gloss: kingdom of heaven, upper-space governance
  status: active
  lead_root: pa
  type: compound (apostrophe-marked)
  class: entity / domain
  register: theological / liturgical
  domain: theology / eschatology
  definition: kingdom of heaven; the governance domain of the upper space; the reign
    associated with the celestial/divine realm. Greek basileia tōn ouranōn (kingdom
    of the heavens). The compound is the governance domain (ka-li-su) qualified by
    its origin-realm (pa-be = upper space).
  composition: 'pa-be (upper space, ascending domain) + ka-li-su (governance/dominion,
    cf. Genesis 1:26) = [upper-space] governance. The apostrophe after pa-be marks
    pa-be as the pre-bound left unit: [pa-be] modifies [ka-li-su].

    Without apostrophe, default right-branching would parse: pa modifies [be-ka-li-su],
    which is not intended.'
  notes: 'This is Tonesu''s canonical rendering of "the Kingdom of Heaven" as used
    in Matthew''s Gospel (Matthew uses "heaven" where Mark/Luke use "God" — i.e.,
    "Kingdom of God" = "Kingdom of Heaven" theologically).

    Short form in prayer: `lo-pa-be''ka-li-su-tu  be-ki` = "may your upper-space-governance
    come into being" = "thy kingdom come." The compound uses apostrophe notation (first
    appearance in the compound registry for this notation type) — normal in writing,
    analytic here.'
  related: pa-be (upper space; used in Genesis 1 for "sky/heaven"), ka-li-su (governance/dominion,
    Genesis 1:26), pa (primitive), be (primitive)
  first_use: Matthew 5–7 translation (Beatitudes 5:3, 5:10; prayer 6:10; 7:21).
  groups:
