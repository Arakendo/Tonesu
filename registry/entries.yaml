    over the elements before distributing them. The compound is not theology-specific:
    it covers any deliberate expression of gratitude or worth-acknowledgment.'
  related: 'ka (primitive: deliberate action), vo (primitive: value/quality), si (primitive:
    signal/representation), wi-si (W063: prayer = will-signal — a related but distinct
