- wnum: W131
  form: ne-zi-re
  gloss: spouse, bonded coupling partner
  status: active
  lead_root: ne
  type: compound
  class: entity / role / kinship
  register: standard / social / legal
  domain: kinship / social / legal
  definition: spouse; bonded coupling partner; the person with whom one is in a recurring
    mutual coupling bond. The relational role of one's partner in an established and
    recognized coupling bond. Greek gunē (woman/wife) and anēr (man/husband) in their
    spousal senses.
