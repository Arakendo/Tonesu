    joining.'
  notes: 'Tonesu is sex-neutral throughout the kinship vocabulary; ne-zi-re is the
    role without biological sex specification. The biological sex of either party,
    if relevant, is expressed via zi-zo-go (W107) and zi-zo-du (W108) as needed.

    `ne-zi-re-ze` = their spouse (genitive suffix on the relational role).

    Key derivatives:

    ne-zi-re-de  = bond-of-recurring-coupling + dissolution = divorcing si-fe-ne-de  =
    bounded-signal-of-bond-dissolution = divorce certificate Opening of Matthew 5:31–32:
    "anyone who divorces his wife" = `lo-zo-li  lo-ne-zi-re-ze  no-ne  ka` = person
