    IS the living liquid, the zo (living) qualified ki''ma (liquid).'
  composition: 'zo (living thing) + ki''ma (liquid, W114) = living-liquid = the fluid
    of life = blood. Two roots plus the internally bound ki''ma apostrophe. Written:
    `zoki''ma`.'
