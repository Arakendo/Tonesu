  register: theological / legal / formal
  domain: theology / law / social
  definition: 'covenant; a formally bounded agreement. A relationship with explicitly
    stated, permanently sealed terms — more than mutual acknowledgment (ne-to, W084:
    transient agreement) and more than a bond (ne: static relation). The fe (boundary/limit)
    seals the terms, making the agreement binding and formally delimited. Covers covenant,
    treaty, contract, any formally instituted bound-agreement.'
  composition: 'ne (relation/bond) + to-fe (epistemic boundary, W028) = relation-at-the-epistemic-boundary
    = a relationship with formally defined stated conditions.

    Right-branch parse: ne modifies [to-fe] = relation-of-the-

    epistemic-limit = a relationship whose terms are explicitly bounded/stated. Extension
    of ne-to (W084); fe seals it.'
  notes: 'The new covenant formula: ti-be-ne-to-fe = fresh/renewed formally bounded
    agreement. GAP-LSP-002: ti-be captures temporal freshness (the covenant entering
    force) but not qualitative surpassing (kainē vs neos distinction in Greek New
    Testament). The qualitative "better covenant" reading (Hebrews) may need a separate
    elaboration.'
  related: 'ne (primitive: relation/bond), to-fe (W028: epistemic boundary), ne-to
    (W084: mutual acknowledgment/agreement — base form), ti-be (W040: upcoming/fresh
    — qualifier for "new"), zo-ki''ma (W164: blood — the material sealing the covenant)'
  qualified_form: 'ti-be-ne-to-fe = new/fresh covenant: ti-be (W040) modifies ne-to-fe
